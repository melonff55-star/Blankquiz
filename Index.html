<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLANKQUIZ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background-color:#a8c8e8;
  background-image:radial-gradient(circle,#fff 2px,transparent 2px);
  background-size:22px 22px;
  font-family:'Nanum Gothic',sans-serif;
  color:#3d2b1f;
  min-height:100vh;
}
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap');
input,textarea,select{font-family:'Nanum Gothic',sans-serif;box-sizing:border-box}
button{font-family:'Nanum Gothic',sans-serif;cursor:pointer}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#e07b6a;border-radius:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}

/* Layout */
#app{max-width:800px;margin:0 auto;padding:20px 16px 40px}

/* Header */
.hdr-banner{background:#c8e88a;border-radius:20px;padding:20px 28px 16px;margin-bottom:12px;text-align:center;cursor:pointer;border:3px solid #a8d060;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.hdr-title{font-family:‘Gaegu’,cursive;font-weight:700;font-size:34px;color:#e07b6a;letter-spacing:1px;text-shadow:2px 2px 0 rgba(255,255,255,.6)}
.hdr-sub{font-size:12px;color:#9a7c6e;margin-top:4px;font-weight:700}
.hdr-nav{background:#e07b6a;border-radius:14px;padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;box-shadow:0 3px 10px rgba(224,123,106,.25)}
.nav-btn{background:rgba(255,255,255,.75);color:#e07b6a;border:2px solid rgba(224,123,106,.4);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.nav-btn.active{background:#e07b6a;color:#fff;border-color:#e07b6a;box-shadow:0 3px 8px rgba(224,123,106,.3)}
.due-badge{margin-left:6px;background:#f9e07a;color:#3d2b1f;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:800}

/* Section */
.section{margin-bottom:28px}
.section-label{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-bar{width:4px;height:18px;background:#e07b6a;border-radius:4px}
.section-title{font-size:13px;font-weight:800;color:#e07b6a}

/* Card box */
.card-box{background:#fffef5;border:2px solid #f0c8a0;border-radius:16px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px}

/* Inputs */
.inp{width:100%;background:#fffef5;border:2px solid #f0c8a0;border-radius:12px;padding:8px 14px;color:#3d2b1f;font-size:14px;outline:none;margin-bottom:4px;font-family:‘Nanum Gothic’,sans-serif}
.inp:focus{border-color:#e07b6a}
textarea.inp{resize:vertical;line-height:1.8;display:block}
select.inp{cursor:pointer}

/* Buttons */
.btn{background:#fff;color:#e07b6a;border:2px solid #f0c8a0;border-radius:20px;padding:7px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 4px rgba(0,0,0,.08);font-family:‘Nanum Gothic’,sans-serif}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 8px rgba(0,0,0,.12)}
.btn.accent{background:#e07b6a;color:#fff;border-color:#e07b6a}
.btn.small{padding:4px 14px;font-size:12px}
.btn.danger{background:#e05050;color:#fff;border-color:#e05050}

/* Label */
.lbl{font-size:12px;color:#9a7c6e;margin-bottom:5px;font-weight:700}

/* Empty */
.empty{color:#9a7c6e;text-align:center;padding:32px;font-size:14px}
.empty.small{padding:10px 0;font-size:12px}

/* Subject card */
.subj-hdr{display:flex;align-items:center;padding:12px 18px;background:#f0f9e8;cursor:pointer;border-radius:14px 14px 0 0}
.subj-body{padding:14px 18px;background:#fffef5}
.ch-row{display:flex;align-items:center;padding:9px 14px;border-radius:12px;margin-bottom:6px;background:#fff8f0;border:1px solid #f0c8a0;gap:8px;flex-wrap:wrap}

/* Quiz card */
.quiz-card{border:2px solid #f0c8a0;border-radius:18px;padding:24px;background:#fffef5;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.progress-bar{height:10px;background:#e8d8c8;border-radius:10px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:10px;transition:width .4s}

/* Blank input */
.blank-wrap{background:rgba(224,123,106,.1);border-bottom:3px solid #e07b6a;padding:0 4px;border-radius:6px 6px 0 0;display:inline}
.blank-input{background:none;border:none;outline:none;color:#e07b6a;font-size:15px;font-weight:800;font-family:‘Nanum Gothic’,sans-serif;min-width:60px}
.blank-filled{background:rgba(91,155,213,.15);border:2px solid #5b9bd5;border-radius:6px;padding:0 8px;color:#5b9bd5;font-weight:800;margin:0 2px;display:inline-block}
.blank-slot{display:inline-block;background:#e8d8c8;border-radius:6px;padding:0 12px;margin:0 2px;min-width:60px}
.blank-result-ok{display:inline-flex;flex-direction:column;align-items:center;vertical-align:bottom;margin:0 4px}
.blank-result-ok .ans{background:rgba(92,184,92,.15);border:2px solid #5cb85c;border-radius:6px;padding:0 8px;color:#5cb85c;font-weight:800;min-width:60px;text-align:center;display:inline-block}
.blank-result-ok .inp-val{font-size:11px;color:#5cb85c;font-weight:700}
.blank-result-ng{display:inline-flex;flex-direction:column;align-items:center;vertical-align:bottom;margin:0 4px}
.blank-result-ng .ans{background:rgba(224,80,80,.15);border:2px solid #e05050;border-radius:6px;padding:0 8px;color:#e05050;font-weight:800;min-width:60px;text-align:center;display:inline-block}
.blank-result-ng .inp-val{font-size:11px;color:#e05050;font-weight:700;text-decoration:line-through}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(168,200,232,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fffef5;border:3px solid #f0c8a0;border-radius:20px;padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}

/* Grid helpers */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px;align-items:end}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.flex1{flex:1}
.hint-box{font-size:12px;color:#e07b6a;margin-bottom:14px;padding:6px 14px;background:rgba(224,123,106,.08);border:2px dashed #f0a898;border-radius:10px;display:inline-block;font-weight:700}
.sm2-box{margin-top:14px;padding:12px 18px;background:#f0f9e8;border-radius:12px;border:2px solid #d4ecc0;font-size:12px;color:#9a7c6e;font-weight:700}
.review-badge{font-size:11px;background:#f9e07a;color:#3d2b1f;border-radius:10px;padding:2px 9px;font-weight:800}
.due-tag{font-size:10px;background:#f9e07a;color:#3d2b1f;border-radius:8px;padding:1px 7px;font-weight:800;margin-left:8px}
.preview-box{margin-top:16px;padding:16px;background:#f0f9e8;border-radius:12px;border:2px solid #d4ecc0;line-height:1.9}
.preview-blank{display:inline-block;background:rgba(224,123,106,.15);border:2px solid #e07b6a;border-radius:6px;padding:0 8px;margin:0 3px;color:#e07b6a;font-weight:800}
.tag-sm{font-size:11px;background:#f0f9e8;color:#9a7c6e;padding:3px 10px;border-radius:10px;font-weight:700;border:1px solid #d4ecc0}
</style>

</head>
<body>
<div id="app"></div>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let _store = {subjects:[],cards:[]};
function loadData(){try{const r=localStorage.getItem('bq_v1');if(r)return JSON.parse(r);}catch{}return _store;}
function saveData(d){_store=d;try{localStorage.setItem('bq_v1',JSON.stringify(d));}catch{}}
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);

let state = {
data: loadData(),
view: ‘home’,
selSub: null, selCh: null,
// study
deck:[], idx:0, phase:‘answering’, inputs:[], cb:0,
// cards view
fs:’’, fc:’’, q:’’, editCard:null, expanded:null,
// create
cTitle:’’, cHint:’’, cBody:’’, cPreview:false,
};

function persist(data){state.data=data;saveData(data);render();}
function setState(patch){Object.assign(state,patch);render();}

// ── SM-2 ──────────────────────────────────────────────────────────────────────
function getNextReview(card,quality){
let{interval=1,ease=2.5,reps=0}=card;
if(quality===0){interval=1;reps=0;}
else{
if(reps===0)interval=1;
else if(reps===1)interval=6;
else interval=Math.round(interval*ease);
reps+=1;
ease=Math.max(1.3,ease+(0.1-(2-quality)*(0.08+(2-quality)*0.02)));
}
const d=new Date();d.setDate(d.getDate()+interval);
return{interval,ease,reps,nextReview:d.toISOString(),lastReview:new Date().toISOString()};
}

function parseBlanks(text){
const parts=[],re=/[[([^]]+)]]/g;let last=0,m;
while((m=re.exec(text))!==null){
if(m.index>last)parts.push({type:‘text’,value:text.slice(last,m.index)});
parts.push({type:‘blank’,value:m[1]});
last=m.index+m[0].length;
}
if(last<text.length)parts.push({type:‘text’,value:text.slice(last)});
return parts;
}
const isDue=c=>!c.nextReview||new Date(c.nextReview)<=new Date();
const getSN=c=>state.data.subjects.find(s=>s.id===c.subjectId)?.name||’?’;
const getCN=c=>state.data.subjects.find(s=>s.id===c.subjectId)?.chapters?.find(ch=>ch.id===c.chapterId)?.name||’?’;

// ── HTML helpers ──────────────────────────────────────────────────────────────
function el(tag,attrs,inner){
const e=document.createElement(tag);
for(const[k,v]of Object.entries(attrs||{})){
if(k.startsWith(‘on’))e.addEventListener(k.slice(2).toLowerCase(),v);
else if(k===‘class’)e.className=v;
else if(k===‘style’&&typeof v===‘object’)Object.assign(e.style,v);
else e.setAttribute(k,v);
}
if(typeof inner===‘string’)e.innerHTML=inner;
else if(Array.isArray(inner))inner.filter(Boolean).forEach(c=>typeof c===‘string’?e.appendChild(document.createTextNode(c)):e.appendChild(c));
else if(inner instanceof Node)e.appendChild(inner);
return e;
}
function btn(text,cls,onClick){const b=el(‘button’,{class:‘btn ‘+(cls||’’),onClick});b.textContent=text;return b;}
function inp(placeholder,value,onInput,extra={}){return el(‘input’,{class:‘inp’,placeholder,value,onInput:e=>onInput(e.target.value),…extra});}
function lbl(text){return el(‘div’,{class:‘lbl’},text);}
function div(…args){
// div(className, children) or div(className, …children)
const cls=args[0];
const children=args.slice(1).flat().filter(Boolean);
return el(‘div’,{class:cls},children);
}

function textWithBreaks(value){
const span=document.createElement(‘span’);
value.split(’\n’).forEach((l,i,a)=>{
span.appendChild(document.createTextNode(l));
if(i<a.length-1)span.appendChild(document.createElement(‘br’));
});
return span;
}

// ── Header ────────────────────────────────────────────────────────────────────
function renderHeader(){
const {view,data} = state;
const dueCount = data.cards.filter(isDue).length;

const banner = el(‘div’,{class:‘hdr-banner’,onClick:()=>setState({view:‘home’})}, [
el(‘div’,{class:‘hdr-title’},‘BLANKQUIZ’),
el(‘div’,{class:‘hdr-sub’},‘빈칸 학습 · 망각곡선 복습 시스템’),
]);

function navBtn(label,v,extra=’’){
const b=el(‘button’,{class:‘nav-btn’+(view===v?’ active’:’’),onClick:()=>{
if(v===‘create’)setState({view:v,selSub:null,selCh:null,cTitle:’’,cHint:’’,cBody:’’,cPreview:false});
else setState({view:v});
}});
b.textContent=label;
if(extra){const s=el(‘span’,{class:‘due-badge’},extra);b.appendChild(s);}
return b;
}

const nav=el(‘div’,{class:‘hdr-nav’},[
navBtn(‘홈’,‘home’),
navBtn(‘카드 만들기’,‘create’),
navBtn(‘카드 목록’,‘cards’),
navBtn(‘복습’,‘review’,dueCount>0?String(dueCount):’’),
]);

return el(‘div’,{},[banner,nav]);
}

// ── Home ──────────────────────────────────────────────────────────────────────
function renderHome(){
const {data}=state;
const {subjects,cards}=data;

let nsVal=’’;
const nsInp=inp(‘새 과목 이름 입력 후 Enter’,’’,v=>nsVal=v);
nsInp.addEventListener(‘keydown’,e=>{
if(e.key===‘Enter’&&nsVal.trim()){
persist({subjects:[…subjects,{id:uid(),name:nsVal.trim(),chapters:[]}],cards});
nsVal=’’;nsInp.value=’’;
}
});
const addBtn=btn(‘추가’,‘accent’,()=>{
if(!nsVal.trim())return;
persist({subjects:[…subjects,{id:uid(),name:nsVal.trim(),chapters:[]}],cards});
nsVal=’’;nsInp.value=’’;
});

const sec=el(‘div’,{class:‘section’},[
el(‘div’,{class:‘section-label’},[el(‘div’,{class:‘section-bar’}),el(‘div’,{class:‘section-title’},‘과목 관리’)]),
el(‘div’,{class:‘flex’,style:{marginBottom:‘20px’}},[nsInp,addBtn]),
subjects.length===0?el(‘div’,{class:‘empty’},‘과목을 추가해서 학습을 시작하세요’):null,
…subjects.map(sub=>renderSubjectCard(sub,cards,persist)),
].filter(Boolean));

return el(‘div’,{class:‘fade’},[sec]);
}

function renderSubjectCard(sub,cards,persist){
const subCards=cards.filter(c=>c.subjectId===sub.id);
let openState=true;
let chVal=’’;

const wrapper=el(‘div’,{style:{border:‘2px solid #d4ecc0’,borderRadius:‘16px’,marginBottom:‘14px’,overflow:‘hidden’,boxShadow:‘0 2px 8px rgba(0,0,0,.06)’}});

function rebuild(){
wrapper.innerHTML=’’;

```
// header
const hdr=el('div',{class:'subj-hdr',onClick:()=>{openState=!openState;rebuild();}}, [
  el('span',{style:{flex:'1',fontWeight:'800',fontSize:'15px'}},sub.name),
  el('span',{style:{color:'#9a7c6e',fontSize:'12px',marginRight:'10px'}},`${(sub.chapters||[]).length}챕터 · ${subCards.length}문제`),
  el('button',{class:'btn small',style:{marginRight:'4px'},onClick:e=>{
    e.stopPropagation();
    if(!confirm('이 과목을 삭제할까요?'))return;
    persist({subjects:state.data.subjects.filter(s=>s.id!==sub.id),cards:state.data.cards.filter(c=>c.subjectId!==sub.id)});
  }},'삭제'),
  el('span',{style:{color:'#9a7c6e',fontSize:'13px'}},openState?'▲':'▼'),
]);
wrapper.appendChild(hdr);

if(!openState)return;

const body=el('div',{class:'subj-body'});

// add chapter
const chInp=inp('챕터 이름 입력 후 Enter','',v=>chVal=v);
chInp.style.marginBottom='0';
chInp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&chVal.trim()){
    const updated={...sub,chapters:[...(sub.chapters||[]),{id:uid(),name:chVal.trim()}]};
    persist({subjects:state.data.subjects.map(s=>s.id===sub.id?updated:s),cards:state.data.cards});
  }
});
const chAdd=btn('추가','small',()=>{
  if(!chVal.trim())return;
  const updated={...sub,chapters:[...(sub.chapters||[]),{id:uid(),name:chVal.trim()}]};
  persist({subjects:state.data.subjects.map(s=>s.id===sub.id?updated:s),cards:state.data.cards});
});
body.appendChild(el('div',{class:'flex',style:{marginBottom:'12px'}},[chInp,chAdd]));

if((sub.chapters||[]).length===0){
  body.appendChild(el('div',{class:'empty small'},'챕터를 추가하세요'));
}

(sub.chapters||[]).forEach(ch=>{
  const chCards=state.data.cards.filter(c=>c.subjectId===sub.id&&c.chapterId===ch.id);
  const dueCnt=chCards.filter(isDue).length;
  const row=el('div',{class:'ch-row'});
  row.appendChild(el('span',{style:{flex:'1',fontSize:'13px',fontWeight:'700'}},ch.name));
  row.appendChild(el('span',{style:{fontSize:'11px',color:'#9a7c6e'}},`${chCards.length}문제`));
  if(dueCnt>0)row.appendChild(el('span',{class:'review-badge'},`복습 ${dueCnt}`));
  row.appendChild(btn('+ 카드','small',()=>setState({view:'create',selSub:sub.id,selCh:ch.id,cTitle:'',cHint:'',cBody:'',cPreview:false})));
  row.appendChild(btn('학습','small accent',()=>{
    const deck=state.data.cards.filter(c=>c.subjectId===sub.id&&c.chapterId===ch.id);
    setState({view:'study',selSub:sub.id,selCh:ch.id,deck,idx:0,phase:'answering',inputs:[],cb:0});
  }));
  row.appendChild(btn('삭제','small',()=>{
    if(!confirm('이 챕터를 삭제할까요?'))return;
    const updated={...sub,chapters:sub.chapters.filter(c=>c.id!==ch.id)};
    persist({subjects:state.data.subjects.map(s=>s.id===sub.id?updated:s),cards:state.data.cards.filter(c=>!(c.subjectId===sub.id&&c.chapterId===ch.id))});
  }));
  body.appendChild(row);
});

wrapper.appendChild(body);
```

}

rebuild();
return wrapper;
}

// ── Create ────────────────────────────────────────────────────────────────────
function renderCreate(){
const {data,selSub,selCh,cTitle,cHint,cBody,cPreview}=state;
const {subjects,cards}=data;
const chapters=subjects.find(s=>s.id===selSub)?.chapters||[];

const wrap=el(‘div’,{class:‘fade’});
const sec=el(‘div’,{class:‘section’});
sec.appendChild(el(‘div’,{class:‘section-label’},[el(‘div’,{class:‘section-bar’}),el(‘div’,{class:‘section-title’},‘새 카드 만들기’)]));

const box=el(‘div’,{class:‘card-box’});

// Subject / Chapter selects
const subSel=el(‘select’,{class:‘inp’,onChange:e=>setState({selSub:e.target.value,selCh:null})});
subSel.appendChild(el(‘option’,{value:’’},’– 과목 선택 –’));
subjects.forEach(s=>{const o=el(‘option’,{value:s.id},s.name);if(s.id===selSub)o.selected=true;subSel.appendChild(o);});

const chSel=el(‘select’,{class:‘inp’,onChange:e=>setState({selCh:e.target.value})});
chSel.appendChild(el(‘option’,{value:’’},’– 챕터 선택 –’));
if(selSub){
chapters.forEach(c=>{const o=el(‘option’,{value:c.id},c.name);if(c.id===selCh)o.selected=true;chSel.appendChild(o);});
chSel.removeAttribute(‘disabled’);
} else {chSel.setAttribute(‘disabled’,‘disabled’);}

const grid=el(‘div’,{class:‘grid2’,style:{marginBottom:‘14px’}});
const d1=el(‘div’);d1.appendChild(lbl(‘과목’));d1.appendChild(subSel);
const d2=el(‘div’);d2.appendChild(lbl(‘챕터’));d2.appendChild(chSel);
grid.appendChild(d1);grid.appendChild(d2);
box.appendChild(grid);

// Title
box.appendChild(lbl(‘제목’));
const titleInp=el(‘input’,{class:‘inp’,placeholder:‘카드 제목…’,value:cTitle,style:{marginBottom:‘10px’},
onInput:e=>state.cTitle=e.target.value});
box.appendChild(titleInp);

// Hint
box.appendChild(lbl(‘힌트 (선택)’));
const hintInp=el(‘input’,{class:‘inp’,placeholder:‘힌트…’,value:cHint,style:{marginBottom:‘10px’},
onInput:e=>state.cHint=e.target.value});
box.appendChild(hintInp);

// Body
box.appendChild(lbl(‘본문 — 가릴 부분을 드래그 후 아래 버튼 클릭’));
const ta=el(‘textarea’,{class:‘inp’,rows:‘6’,placeholder:‘본문 내용을 입력하세요.\n예: 광합성은 [[엽록체]]에서 일어난다.’,
onInput:e=>state.cBody=e.target.value});
ta.value=cBody;
box.appendChild(ta);

// Buttons
const wrapBtn=btn(‘선택 → [[빈칸]]’,’’,()=>{
const s=ta.selectionStart,e2=ta.selectionEnd;
if(s===e2)return;
const next=ta.value.slice(0,s)+`[[${ta.value.slice(s,e2)}]]`+ta.value.slice(e2);
ta.value=next;state.cBody=next;
ta.focus();ta.setSelectionRange(s+2,e2+2);
});
const prevBtn=btn(cPreview?‘편집 모드’:‘미리보기’,’’,()=>setState({cPreview:!cPreview,cBody:ta.value,cTitle:titleInp.value,cHint:hintInp.value}));
const saveBtn=btn(‘저장’,‘accent’,()=>{
const t=titleInp.value.trim(),h=hintInp.value.trim(),b=ta.value.trim();
if(!t||!b||!state.selSub||!state.selCh){alert(‘과목, 챕터, 제목, 본문을 모두 입력하세요.’);return;}
if(parseBlanks(b).filter(p=>p.type===‘blank’).length===0){alert(‘본문에 [[빈칸]]을 하나 이상 지정하세요.’);return;}
persist({subjects,cards:[…cards,{id:uid(),subjectId:state.selSub,chapterId:state.selCh,title:t,hint:h,body:b,created:new Date().toISOString()}]});

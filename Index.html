<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLANKQUIZ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background-color:#a8c8e8;background-image:radial-gradient(circle,#fff 2px,transparent 2px);background-size:22px 22px;font-family:sans-serif;color:#3d2b1f;min-height:100vh;}

input,textarea,select{font-family:sans-serif;box-sizing:border-box}
button{font-family:sans-serif;cursor:pointer}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#e07b6a;border-radius:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}
#app{max-width:800px;margin:0 auto;padding:20px 16px 40px}
.hdr-banner{background:#c8e88a;border-radius:20px;padding:20px 28px 16px;margin-bottom:12px;text-align:center;cursor:pointer;border:3px solid #a8d060;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.hdr-title{font-family:sans-serif;font-weight:700;font-size:34px;color:#e07b6a;letter-spacing:1px;text-shadow:2px 2px 0 rgba(255,255,255,.6)}
.hdr-sub{font-size:12px;color:#9a7c6e;margin-top:4px;font-weight:700}
.hdr-nav{background:#e07b6a;border-radius:14px;padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;box-shadow:0 3px 10px rgba(224,123,106,.25)}
.nav-btn{background:rgba(255,255,255,.75);color:#e07b6a;border:2px solid rgba(224,123,106,.4);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.nav-btn.active{background:#e07b6a;color:#fff;border-color:#e07b6a;box-shadow:0 3px 8px rgba(224,123,106,.3)}
.nav-btn.purple{color:#9b7fd4;border-color:rgba(155,127,212,.4)}
.nav-btn.purple.active{background:#9b7fd4;color:#fff;border-color:#9b7fd4}
.due-badge{margin-left:6px;background:#f9e07a;color:#3d2b1f;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:800}
.section{margin-bottom:28px}
.section-label{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-bar{width:4px;height:18px;background:#e07b6a;border-radius:4px;flex-shrink:0}
.section-title{font-size:13px;font-weight:800;color:#e07b6a}
.card-box{background:#fffef5;border:2px solid #f0c8a0;border-radius:16px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px}
.inp{width:100%;background:#fffef5;border:2px solid #f0c8a0;border-radius:12px;padding:8px 14px;color:#3d2b1f;font-size:14px;outline:none;margin-bottom:4px;font-family:sans-serif}
.inp:focus{border-color:#e07b6a}
textarea.inp{resize:vertical;line-height:1.8;display:block}
.btn{background:#fff;color:#e07b6a;border:2px solid #f0c8a0;border-radius:20px;padding:7px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 4px rgba(0,0,0,.08);font-family:sans-serif}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 8px rgba(0,0,0,.12)}
.btn.accent{background:#e07b6a;color:#fff;border-color:#e07b6a}
.btn.green{background:#5cb85c;color:#fff;border-color:#5cb85c}
.btn.red{background:#e05050;color:#fff;border-color:#e05050}
.btn.purple{background:#9b7fd4;color:#fff;border-color:#9b7fd4}
.btn.small{padding:4px 14px;font-size:12px}
.lbl{font-size:12px;color:#9a7c6e;margin-bottom:5px;font-weight:700}
.empty{color:#9a7c6e;text-align:center;padding:32px;font-size:14px}
.empty.small{padding:10px 0;font-size:12px}
.subj-hdr{display:flex;align-items:center;padding:12px 18px;background:#f0f9e8;cursor:pointer;border-radius:14px 14px 0 0}
.subj-body{padding:14px 18px;background:#fffef5}
.ch-row{display:flex;align-items:center;padding:9px 14px;border-radius:12px;margin-bottom:6px;background:#fff8f0;border:1px solid #f0c8a0;gap:8px;flex-wrap:wrap}
.quiz-card{border:2px solid #f0c8a0;border-radius:18px;padding:24px;background:#fffef5;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.quiz-card.gb{border-color:#d4ecc0}
.quiz-card.rb{border-color:rgba(224,80,80,.4)}
.quiz-card.pb{border-color:rgba(155,127,212,.3)}
.progress-bar{height:10px;background:#e8d8c8;border-radius:10px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:10px;transition:width .4s}
.blank-wrap{background:rgba(224,123,106,.1);border-bottom:3px solid #e07b6a;padding:0 4px;border-radius:6px 6px 0 0;display:inline}
.blank-input{background:none;border:none;outline:none;color:#e07b6a;font-size:15px;font-weight:800;font-family:sans-serif;min-width:60px}
.blank-filled{background:rgba(91,155,213,.15);border:2px solid #5b9bd5;border-radius:6px;padding:0 8px;color:#5b9bd5;font-weight:800;margin:0 2px;display:inline-block}
.blank-locked{background:rgba(92,184,92,.2);border:2px solid #5cb85c;border-radius:6px;padding:0 8px;color:#5cb85c;font-weight:800;margin:0 2px;display:inline-block}
.blank-slot{display:inline-block;background:#e8d8c8;border-radius:6px;padding:0 12px;margin:0 2px;min-width:60px}
.bok{display:inline-flex;flex-direction:column;align-items:center;vertical-align:bottom;margin:0 4px}
.bok .ans{background:rgba(92,184,92,.15);border:2px solid #5cb85c;border-radius:6px;padding:0 8px;color:#5cb85c;font-weight:800;min-width:60px;text-align:center;display:inline-block}
.bok .iv{font-size:11px;color:#5cb85c;font-weight:700}
.bng{display:inline-flex;flex-direction:column;align-items:center;vertical-align:bottom;margin:0 4px}
.bng .ans{background:rgba(224,80,80,.15);border:2px solid #e05050;border-radius:6px;padding:0 8px;color:#e05050;font-weight:800;min-width:60px;text-align:center;display:inline-block}
.bng .iv{font-size:11px;color:#e05050;font-weight:700;text-decoration:line-through}
.modal-bg{position:fixed;inset:0;background:rgba(168,200,232,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fffef5;border:3px solid #f0c8a0;border-radius:20px;padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px;align-items:end}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hint-box{font-size:12px;color:#e07b6a;margin-bottom:14px;padding:6px 14px;background:rgba(224,123,106,.08);border:2px dashed #f0a898;border-radius:10px;display:inline-block;font-weight:700}
.info-box{margin-top:14px;padding:12px 18px;background:#f0f9e8;border-radius:12px;border:2px solid #d4ecc0;font-size:12px;color:#9a7c6e;font-weight:700}
.rbadge{font-size:11px;background:#f9e07a;color:#3d2b1f;border-radius:10px;padding:2px 9px;font-weight:800}
.due-tag{font-size:10px;background:#f9e07a;color:#3d2b1f;border-radius:8px;padding:1px 7px;font-weight:800;margin-left:8px}
.locked-notice{margin-bottom:8px;padding:4px 14px;background:rgba(92,184,92,.15);border:1px solid #5cb85c;border-radius:10px;font-size:12px;color:#5cb85c;font-weight:700;display:inline-block}
.retry-notice{font-size:12px;color:#e05050;font-weight:700;margin-top:6px}
.preview-blank{display:inline-block;background:rgba(224,123,106,.15);border:2px solid #e07b6a;border-radius:6px;padding:0 8px;margin:0 3px;color:#e07b6a;font-weight:800}
.tag-sm{font-size:11px;background:#f0f9e8;color:#9a7c6e;padding:3px 10px;border-radius:10px;font-weight:700;border:1px solid #d4ecc0}
.score-big{font-size:48px;font-weight:800;margin-bottom:4px}
.wrong-card{padding:10px 14px;background:rgba(224,80,80,.06);border:1px solid rgba(224,80,80,.3);border-radius:12px;margin-bottom:6px}
.start-info{margin-bottom:16px;padding:12px 16px;background:rgba(249,224,122,.2);border-radius:12px;border:1px dashed #f9e07a;font-size:13px;color:#3d2b1f;font-weight:700}
</style>

</head>
<body>
<div id="app"></div>
<script>
const C={green:'#5cb85c',red:'#e05050',blue:'#5b9bd5',accent:'#e07b6a',purple:'#9b7fd4',yellow:'#f9e07a',muted:'#9a7c6e',text:'#3d2b1f',border:'#f0c8a0',soft:'#d4ecc0',surfAlt:'#f0f9e8',bg:'#fffef5'};

function getNextReview(card,quality){
let{interval=1,ease=2.5,reps=0}=card;
if(quality===0){interval=1;reps=0;}
else{if(reps===0)interval=1;else if(reps===1)interval=6;else interval=Math.round(interval*ease);reps+=1;ease=Math.max(1.3,ease+(0.1-(2-quality)*(0.08+(2-quality)*0.02)));}
const d=new Date();d.setDate(d.getDate()+interval);
return{interval,ease,reps,nextReview:d.toISOString(),lastReview:new Date().toISOString()};
}

const KEY=‘blankquiz_v1’;let _mem={subjects:[],cards:[]};
function loadData(){try{const r=localStorage.getItem(KEY)||localStorage.getItem(‘bq_v1’);if(r)return JSON.parse(r);}catch{}return _mem;}
function saveData(d){_mem=d;try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}}
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const shuffle=a=>[…a].sort(()=>Math.random()-.5);
function parseBlanks(text){const parts=[],re=/[[([^]]+)]]/g;let last=0,m;while((m=re.exec(text))!==null){if(m.index>last)parts.push({type:‘text’,value:text.slice(last,m.index)});parts.push({type:‘blank’,value:m[1]});last=m.index+m[0].length;}if(last<text.length)parts.push({type:‘text’,value:text.slice(last)});return parts;}
const isDue=c=>!c.nextReview||new Date(c.nextReview)<=new Date();

let S={data:loadData(),view:‘home’,selSub:null,selCh:null,cTitle:’’,cHint:’’,cBody:’’,cPreview:false,
studyQueue:[],studyIdx:0,studyPhase:‘answering’,studyInputs:[],studyCb:0,studyLocked:new Set(),studyDone:0,
testStarted:false,testDeck:[],testIdx:0,testPhase:‘answering’,testInputs:[],testCb:0,testResults:[],testSelSub:null,testSelCh:null,
revStarted:false,revDeck:[],revIdx:0,revPhase:‘answering’,revInputs:[],revCb:0,revResults:[],
cardFs:’’,cardFc:’’,cardQ:’’,cardEdit:null,cardExpanded:null};
function persist(data){S.data=data;saveData(data);render();}
function set(patch){Object.assign(S,patch);render();}

function el(tag,attrs,children){
const e=document.createElement(tag);
for(const[k,v]of Object.entries(attrs||{})){
if(k===‘class’)e.className=v;
else if(k===‘style’&&typeof v===‘object’)Object.assign(e.style,v);
else if(k.startsWith(‘on’))e.addEventListener(k.slice(2).toLowerCase(),v);
else e.setAttribute(k,v);
}
if(typeof children===‘string’)e.innerHTML=children;
else if(Array.isArray(children))children.flat().filter(Boolean).forEach(c=>e.appendChild(typeof c===‘string’?document.createTextNode(c):c));
else if(children instanceof Node)e.appendChild(children);
return e;
}
function btn(text,cls,onClick){const b=el(‘button’,{class:‘btn ‘+(cls||’’),onClick});b.textContent=text;return b;}
function lbl(text){return el(‘div’,{class:‘lbl’},text);}
function textWithBreaks(val){const sp=document.createElement(‘span’);val.split(’\n’).forEach((l,i,a)=>{sp.appendChild(document.createTextNode(l));if(i<a.length-1)sp.appendChild(document.createElement(‘br’));});return sp;}
function sectionEl(label,children){return el(‘div’,{class:‘section’},[el(‘div’,{class:‘section-label’},[el(‘div’,{class:‘section-bar’}),el(‘div’,{class:‘section-title’},label)]),…(Array.isArray(children)?children:[children])]);}
function inp(ph,val,onInput,extra={}){return el(‘input’,{class:‘inp’,placeholder:ph,value:val,onInput:e=>onInput(e.target.value),…extra});}

function renderHeader(){
const{view,data}=S;const dueCount=data.cards.filter(isDue).length;
const banner=el(‘div’,{class:‘hdr-banner’,onClick:()=>set({view:‘home’})},[el(‘div’,{class:‘hdr-title’},‘BLANKQUIZ’),el(‘div’,{class:‘hdr-sub’},‘빈칸 학습 · 망각곡선 복습 시스템’)]);
function nb(label,v,cls){
const b=el(‘button’,{class:‘nav-btn ‘+(cls||’’)+(view===v?’ active’:’’),onClick:()=>{
if(v===‘create’)set({view:v,selSub:null,selCh:null,cTitle:’’,cHint:’’,cBody:’’,cPreview:false});
else set({view:v});
}});
b.textContent=label;
if(v===‘review’&&dueCount>0)b.appendChild(el(‘span’,{class:‘due-badge’},String(dueCount)));
return b;
}
const nav=el(‘div’,{class:‘hdr-nav’},[nb(‘홈’,‘home’),nb(‘카드 만들기’,‘create’),nb(‘카드 목록’,‘cards’),nb(‘테스트’,‘test’,‘purple’),nb(‘복습’,‘review’)]);
return el(‘div’,{style:{marginBottom:‘20px’}},[banner,nav]);
}

function renderHome(){
const{data}=S;const{subjects,cards}=data;let nsVal=’’;
const nsInp=inp(‘새 과목 이름 입력 후 Enter’,’’,v=>nsVal=v);
const doAdd=()=>{if(!nsVal.trim())return;persist({subjects:[…subjects,{id:uid(),name:nsVal.trim(),chapters:[]}],cards});nsVal=’’;nsInp.value=’’;};
nsInp.addEventListener(‘keydown’,e=>{if(e.key===‘Enter’)doAdd();});
return el(‘div’,{class:‘fade’},[sectionEl(‘과목 관리’,[
el(‘div’,{class:‘flex’,style:{marginBottom:‘20px’}},[nsInp,btn(‘추가’,‘accent’,doAdd)]),
subjects.length===0?el(‘div’,{class:‘empty’},‘과목을 추가해서 학습을 시작하세요’):null,
…subjects.map(sub=>renderSubjectCard(sub,cards))
].filter(Boolean))]);
}

function renderSubjectCard(sub,cards){
const subCards=cards.filter(c=>c.subjectId===sub.id);
let open=true;let chVal=’’;
const wrapper=el(‘div’,{style:{border:‘2px solid #d4ecc0’,borderRadius:‘16px’,marginBottom:‘14px’,overflow:‘hidden’,boxShadow:‘0 2px 8px rgba(0,0,0,.06)’}});
function rebuild(){
wrapper.innerHTML=’’;
const hdr=el(‘div’,{class:‘subj-hdr’,onClick:()=>{open=!open;rebuild();}});
hdr.appendChild(el(‘span’,{style:{flex:‘1’,fontWeight:‘800’,fontSize:‘15px’}},sub.name));
hdr.appendChild(el(‘span’,{style:{color:C.muted,fontSize:‘12px’,marginRight:‘10px’}},`${(sub.chapters||[]).length}챕터 · ${subCards.length}문제`));
hdr.appendChild(el(‘button’,{style:{background:‘none’,border:‘none’,color:C.red,fontSize:‘14px’,padding:‘2px 6px’,cursor:‘pointer’},
onClick:e=>{e.stopPropagation();if(!confirm(‘삭제?’))return;persist({subjects:S.data.subjects.filter(s=>s.id!==sub.id),cards:S.data.cards.filter(c=>c.subjectId!==sub.id)});}},‘X’));
hdr.appendChild(el(‘span’,{style:{color:C.muted,marginLeft:‘6px’,fontSize:‘13px’}},open?‘▲’:‘▼’));
wrapper.appendChild(hdr);
if(!open)return;
const body=el(‘div’,{class:‘subj-body’});
const chInp=inp(‘챕터 이름 입력 후 Enter’,’’,v=>chVal=v);chInp.style.marginBottom=‘0’;
const doAddCh=()=>{if(!chVal.trim())return;const updated={…sub,chapters:[…(sub.chapters||[]),{id:uid(),name:chVal.trim()}]};persist({subjects:S.data.subjects.map(s=>s.id===sub.id?updated:s),cards:S.data.cards});};
chInp.addEventListener(‘keydown’,e=>{if(e.key===‘Enter’)doAddCh();});
body.appendChild(el(‘div’,{class:‘flex’,style:{marginBottom:‘12px’}},[chInp,btn(‘추가’,‘small’,doAddCh)]));
if(!(sub.chapters||[]).length)body.appendChild(el(‘div’,{class:‘empty small’},‘챕터를 추가하세요’));
(sub.chapters||[]).forEach(ch=>{
const chCards=S.data.cards.filter(c=>c.subjectId===sub.id&&c.chapterId===ch.id);
const dueCnt=chCards.filter(isDue).length;
const row=el(‘div’,{class:‘ch-row’});
row.appendChild(el(‘span’,{style:{flex:‘1’,fontSize:‘13px’,fontWeight:‘700’}},ch.name));
row.appendChild(el(‘span’,{style:{fontSize:‘11px’,color:C.muted}},`${chCards.length}문제`));
if(dueCnt>0)row.appendChild(el(‘span’,{class:‘rbadge’},`복습 ${dueCnt}`));
row.appendChild(btn(’+ 카드’,‘small’,()=>set({view:‘create’,selSub:sub.id,selCh:ch.id,cTitle:’’,cHint:’’,cBody:’’,cPreview:false})));
row.appendChild(btn(‘학습’,‘small green’,()=>set({view:‘study’,selSub:sub.id,selCh:ch.id,studyQueue:S.data.cards.filter(c=>c.subjectId===sub.id&&c.chapterId===ch.id),studyIdx:0,studyPhase:‘answering’,studyInputs:[],studyCb:0,studyLocked:new Set(),studyDone:0})));
row.appendChild(btn(‘삭제’,‘small’,()=>{if(!confirm(‘챕터 삭제?’))return;const updated={…sub,chapters:sub.chapters.filter(c=>c.id!==ch.id)};persist({subjects:S.data.subjects.map(s=>s.id===sub.id?updated:s),cards:S.data.cards.filter(c=>!(c.subjectId===sub.id&&c.chapterId===ch.id))});}));
body.appendChild(row);
});
wrapper.appendChild(body);
}
rebuild();return wrapper;
}

function renderCreate(){
const{data,selSub,selCh,cTitle,cHint,cBody,cPreview}=S;const{subjects,cards}=data;
const chapters=subjects.find(s=>s.id===selSub)?.chapters||[];
const box=el(‘div’,{class:‘card-box’});
const grid=el(‘div’,{class:‘grid2’,style:{marginBottom:‘14px’}});
const subSel=el(‘select’,{class:‘inp’,onChange:e=>set({selSub:e.target.value,selCh:null})});
subSel.appendChild(el(‘option’,{value:’’},’– 과목 선택 –’));
subjects.forEach(s=>{const o=el(‘option’,{value:s.id},s.name);if(s.id===selSub)o.selected=true;subSel.appendChild(o);});
const chSel=el(‘select’,{class:‘inp’,onChange:e=>set({selCh:e.target.value})});
chSel.appendChild(el(‘option’,{value:’’},’– 챕터 선택 –’));
if(selSub){chapters.forEach(c=>{const o=el(‘option’,{value:c.id},c.name);if(c.id===selCh)o.selected=true;chSel.appendChild(o);});}else chSel.disabled=true;
const d1=el(‘div’);d1.appendChild(lbl(‘과목’));d1.appendChild(subSel);
const d2=el(‘div’);d2.appendChild(lbl(‘챕터’));d2.appendChild(chSel);
grid.appendChild(d1);grid.appendChild(d2);box.appendChild(grid);
box.appendChild(lbl(‘제목’));
const tInp=el(‘input’,{class:‘inp’,placeholder:‘카드 제목…’,value:cTitle,style:{marginBottom:‘10px’},onInput:e=>S.cTitle=e.target.value});box.appendChild(tInp);
box.appendChild(lbl(‘힌트 (선택)’));
const hInp=el(‘input’,{class:‘inp’,placeholder:‘힌트…’,value:cHint,style:{marginBottom:‘10px’},onInput:e=>S.cHint=e.target.value});box.appendChild(hInp);
box.appendChild(lbl(‘본문 — 가릴 부분을 드래그 후 아래 버튼 클릭’));
const ta=el(‘textarea’,{class:‘inp’,rows:‘6’,placeholder:‘본문 내용을 입력하세요.\n예: 광합성은 [[엽록체]]에서 일어난다.’,onInput:e=>S.cBody=e.target.value});ta.value=cBody;box.appendChild(ta);
const wrapBtn=btn(‘선택 → [[빈칸]]’,’’,()=>{const s=ta.selectionStart,e=ta.selectionEnd;if(s===e)return;const next=ta.value.slice(0,s)+`[[${ta.value.slice(s,e)}]]`+ta.value.slice(e);ta.value=next;S.cBody=next;ta.focus();ta.setSelectionRange(s+2,e+2);});
const prevBtn=btn(cPreview?‘편집 모드’:‘미리보기’,’’,()=>set({cPreview:!cPreview,cBody:ta.value,cTitle:tInp.value,cHint:hInp.value}));
const saveBtn=btn(‘저장’,‘accent’,()=>{
const t=tInp.value.trim(),h=hInp.value.trim(),b=ta.value.trim();
if(!t||!b||!S.selSub||!S.selCh){alert(‘과목, 챕터, 제목, 본문을 모두 입력하세요.’);return;}
if(!parseBlanks(b).some(p=>p.type===‘blank’)){alert(‘본문에 [[빈칸]]을 하나 이상 지정하세요.’);return;}
persist({subjects,cards:[…cards,{id:uid(),subjectId:S.selSub,chapterId:S.selCh,title:t,hint:h,body:b,created:new Date().toISOString()}]});
S.cTitle=’’;S.cHint=’’;S.cBody=’’;S.cPreview=false;tInp.value=’’;hInp.value=’’;ta.value=’’;alert(‘저장됐습니다!’);
});

}

function renderCards(){
const{data,cardFs,cardFc,cardQ,cardEdit,cardExpanded}=S;const{subjects,cards}=data;
const chapters=subjects.find(s=>s.id===cardFs)?.chapters||[];
const filtered=cards.filter(c=>{if(cardFs&&c.subjectId!==cardFs)return false;if(cardFc&&c.chapterId!==cardFc)return false;if(cardQ){const q=cardQ.toLowerCase();return c.title.toLowerCase().includes(q)||c.body.toLowerCase().includes(q);}return true;});
const getSN=c=>subjects.find(s=>s.id===c.subjectId)?.name||’?’;const getCN=c=>subjects.find(s=>s.id===c.subjectId)?.chapters?.find(ch=>ch.id===c.chapterId)?.name||’?’;
const wrap=el(‘div’,{class:‘fade’});
if(cardEdit)wrap.appendChild(renderEditModal(cardEdit,subjects,cards));
const filterGrid=el(‘div’,{class:‘grid3’,style:{marginBottom:‘16px’}});
const subSel=el(‘select’,{class:‘inp’,style:{marginBottom:‘0’},onChange:e=>set({cardFs:e.target.value,cardFc:’’})});subSel.appendChild(el(‘option’,{value:’’},‘전체’));subjects.forEach(s=>{const o=el(‘option’,{value:s.id},s.name);if(s.id===cardFs)o.selected=true;subSel.appendChild(o);});
const chSel=el(‘select’,{class:‘inp’,style:{marginBottom:‘0’},onChange:e=>set({cardFc:e.target.value})});chSel.appendChild(el(‘option’,{value:’’},‘전체’));if(cardFs){chapters.forEach(c=>{const o=el(‘option’,{value:c.id},c.name);if(c.id===cardFc)o.selected=true;chSel.appendChild(o);});}else chSel.disabled=true;
const searchInp=el(‘input’,{class:‘inp’,style:{marginBottom:‘0’},placeholder:‘검색…’,value:cardQ,onInput:e=>set({cardQ:e.target.value})});
const d1=el(‘div’);d1.appendChild(lbl(‘과목’));d1.appendChild(subSel);const d2=el(‘div’);d2.appendChild(lbl(‘챕터’));d2.appendChild(chSel);const d3=el(‘div’);d3.appendChild(lbl(‘검색’));d3.appendChild(searchInp);
filterGrid.appendChild(d1);filterGrid.appendChild(d2);filterGrid.appendChild(d3);
const sec=sectionEl(`카드 목록 (${filtered.length}개)`,[filterGrid]);
if(!filtered.length)sec.appendChild(el(‘div’,{class:‘empty’},‘카드가 없습니다’));
filtered.forEach(card=>{
const parts=parseBlanks(card.body);const bc=parts.filter(p=>p.type===‘blank’).length;const isExp=cardExpanded===card.id;const due=isDue(card);
const cardEl=el(‘div’,{style:{border:`2px solid ${isExp?C.accent:C.border}`,borderRadius:‘14px’,marginBottom:‘10px’,overflow:‘hidden’,transition:‘border-color .2s’,boxShadow:‘0 2px 8px rgba(0,0,0,.05)’}});
const hdr=el(‘div’,{style:{display:‘flex’,alignItems:‘center’,padding:‘11px 16px’,background:isExp?‘rgba(224,123,106,.06)’:’#fff8f0’,gap:‘10px’,flexWrap:‘wrap’}});
const info=el(‘div’,{style:{cursor:‘pointer’,flex:‘1’,minWidth:‘0’},onClick:()=>set({cardExpanded:isExp?null:card.id})});
info.appendChild(el(‘div’,{style:{fontWeight:‘800’,fontSize:‘14px’,whiteSpace:‘nowrap’,overflow:‘hidden’,textOverflow:‘ellipsis’}},card.title));
const sub2=el(‘div’,{style:{fontSize:‘11px’,color:C.muted,marginTop:‘3px’,fontWeight:‘700’}},`${getSN(card)} · ${getCN(card)} · 빈칸 ${bc}개`);if(due)sub2.appendChild(el(‘span’,{class:‘due-tag’},‘복습 대기’));info.appendChild(sub2);
hdr.appendChild(info);hdr.appendChild(btn(‘수정’,‘small’,()=>set({cardEdit:card})));hdr.appendChild(el(‘button’,{style:{background:‘none’,border:‘none’,color:C.red,cursor:‘pointer’,fontSize:‘15px’,padding:‘2px 6px’},onClick:()=>{if(!confirm(‘삭제?’))return;persist({subjects,cards:cards.filter(c=>c.id!==card.id)});}},‘X’));hdr.appendChild(el(‘span’,{style:{color:C.muted,cursor:‘pointer’,fontSize:‘13px’},onClick:()=>set({cardExpanded:isExp?null:card.id})},isExp?‘▲’:‘▼’));cardEl.appendChild(hdr);
if(isExp){const body=el(‘div’,{style:{padding:‘16px 18px’,background:C.bg}});if(card.hint)body.appendChild(el(‘div’,{class:‘hint-box’},`힌트: ${card.hint}`));const bt=el(‘div’,{style:{lineHeight:‘2’,fontSize:‘14px’}});parts.forEach(p=>{if(p.type===‘blank’)bt.appendChild(el(‘span’,{style:{display:‘inline-block’,background:‘rgba(224,123,106,.2)’,border:‘2px solid #e07b6a’,borderRadius:‘6px’,padding:‘0 8px’,color:’#e07b6a’,fontWeight:‘800’,margin:‘0 3px’}},p.value));else bt.appendChild(textWithBreaks(p.value));});body.appendChild(bt);if(card.nextReview)body.appendChild(el(‘div’,{style:{marginTop:‘10px’,fontSize:‘11px’,color:C.muted,fontWeight:‘700’}},`다음 복습: ${new Date(card.nextReview).toLocaleDateString('ko-KR')} · 반복 ${card.reps||0}회`));cardEl.appendChild(body);}
sec.appendChild(cardEl);
});
wrap.appendChild(sec);return wrap;
}

function renderEditModal(card,subjects,cards){
let t=card.title,h=card.hint||’’,b=card.body,sid=card.subjectId,cid=card.chapterId;
const chapters=subjects.find(s=>s.id===sid)?.chapters||[];
const bg=el(‘div’,{class:‘modal-bg’,onClick:e=>{if(e.target===bg)set({cardEdit:null});}});
const box=el(‘div’,{class:‘modal-box’});
const tb=el(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,marginBottom:‘20px’}});tb.appendChild(el(‘div’,{style:{fontFamily:‘sans-serif’,fontWeight:‘700’,fontSize:‘22px’,color:C.accent}},‘카드 수정’));tb.appendChild(el(‘button’,{style:{background:‘rgba(240,168,152,.2)’,border:‘none’,color:C.accent,fontSize:‘18px’,cursor:‘pointer’,borderRadius:‘50%’,width:‘32px’,height:‘32px’},onClick:()=>set({cardEdit:null})},‘X’));box.appendChild(tb);
const grid=el(‘div’,{class:‘grid2’,style:{marginBottom:‘14px’}});
const subSel=el(‘select’,{class:‘inp’,onChange:e=>{sid=e.target.value;cid=’’;}});subjects.forEach(s=>{const o=el(‘option’,{value:s.id},s.name);if(s.id===sid)o.selected=true;subSel.appendChild(o);});
const chSel=el(‘select’,{class:‘inp’,onChange:e=>cid=e.target.value});chapters.forEach(c=>{const o=el(‘option’,{value:c.id},c.name);if(c.id===cid)o.selected=true;chSel.appendChild(o);});
const d1=el(‘div’);d1.appendChild(lbl(‘과목’));d1.appendChild(subSel);const d2=el(‘div’);d2.appendChild(lbl(‘챕터’));d2.appendChild(chSel);grid.appendChild(d1);grid.appendChild(d2);box.appendChild(grid);
box.appendChild(lbl(‘제목’));const tInp=el(‘input’,{class:‘inp’,value:t,style:{marginBottom:‘10px’},onInput:e=>t=e.target.value});box.appendChild(tInp);
box.appendChild(lbl(‘힌트 (선택)’));const hInp=el(‘input’,{class:‘inp’,value:h,placeholder:‘힌트…’,style:{marginBottom:‘10px’},onInput:e=>h=e.target.value});box.appendChild(hInp);
box.appendChild(lbl(‘본문’));const ta=el(‘textarea’,{class:‘inp’,rows:‘8’,onInput:e=>b=e.target.value});ta.value=b;box.appendChild(ta);
const wrapBtn=btn(‘선택 → [[빈칸]]’,’’,()=>{const s=ta.selectionStart,e=ta.selectionEnd;if(s===e)return;const next=ta.value.slice(0,s)+`[[${ta.value.slice(s,e)}]]`+ta.value.slice(e);ta.value=next;b=next;ta.focus();ta.setSelectionRange(s+2,e+2);});
const saveBtn=btn(‘저장’,‘accent’,()=>{if(!t.trim()||!b.trim()){alert(‘제목과 본문을 입력하세요.’);return;}if(!parseBlanks(b).some(p=>p.type===‘blank’)){alert(’[[빈칸]]을 하나 이상 지정하세요.’);return;}persist({subjects,cards:cards.map(c=>c.id===card.id?{…c,title:t.trim(),hint:h.trim(),body:b.trim(),subjectId:sid,chapterId:cid}:c)});set({cardEdit:null});});
box.appendChild(el(‘div’,{class:‘flex’,style:{marginTop:‘12px’,justifyContent:‘flex-end’}},[wrapBtn,btn(‘취소’,’’,()=>set({cardEdit:null})),saveBtn]));
bg.appendChild(box);return bg;
}

function render(){
const app=document.getElementById(‘app’);app.innerHTML=’’;app.appendChild(renderHeader());
const{view}=S;
if(view===‘home’)app.appendChild(renderHome());
else if(view===‘create’)app.appendChild(renderCreate());
else if(view===‘study’)app.appendChild(renderStudy());
else if(view===‘test’)app.appendChild(renderTest());
else if(view===‘review’)app.appendChild(renderReview());
else if(view===‘cards’)app.appendChild(renderCards());
}
render();
</script>

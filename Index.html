<body>
<div id="app"></div>
<script>
// ── 색상 ────────────────────────────────────────────────────────────────────
const C={green:'#5cb85c',red:'#e05050',blue:'#5b9bd5',accent:'#e07b6a',purple:'#9b7fd4',teal:'#3aafa9',yellow:'#f9e07a',muted:'#9a7c6e',text:'#3d2b1f',border:'#f0c8a0',soft:'#d4ecc0',surfAlt:'#f0f9e8',bg:'#fffef5'};
const REV_DAILY=20; // 하루 복습 기본 할당량

// ── SM-2 ────────────────────────────────────────────────────────────────────
// 망각곡선 기반 복습 주기 (학습과 분리 - 복습에서만 호출)
const REV_INTERVALS=[1,3,7,14,30,60,120];
function getNextReview(card,quality){
  // quality: 0=오답, 1=부분정답, 2=정답
  let reps=card.reps||0;
  if(quality===0){reps=0;}
  else{reps=Math.min(reps+1,REV_INTERVALS.length-1);}
  const interval=REV_INTERVALS[reps];
  const d=new Date();d.setDate(d.getDate()+interval);
  return{interval,reps,nextReview:d.toISOString(),lastReview:new Date().toISOString()};
}

// ── Storage ──────────────────────────────────────────────────────────────────
const KEY='blankquiz_v1';const SKEY='blankquiz_study';
let _mem={subjects:[],cards:[]};
function loadData(){try{const r=localStorage.getItem(KEY)||localStorage.getItem('bq_v1');if(r)return JSON.parse(r);}catch{}return _mem;}
function saveData(d){_mem=d;try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}}
function saveStudy(p){try{localStorage.setItem(SKEY,JSON.stringify(p));}catch{}}
function loadStudy(){try{const r=localStorage.getItem(SKEY);if(r)return JSON.parse(r);}catch{}return null;}
function clearStudy(){try{localStorage.removeItem(SKEY);}catch{}}
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

// ── 초성 추출 ────────────────────────────────────────────────────────────────
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function toChosung(str){
  // [[...]] 안의 내용은 변환하지 않고 그대로 유지
  return str.replace(new RegExp('\\[\\[([^\\]]+)\\]\\]','g'),'[$1]').split('').map(ch=>{
    const code=ch.charCodeAt(0);
    if(code>=0xAC00&&code<=0xD7A3)return CHO[Math.floor((code-0xAC00)/28/21)];
    if(ch===' ')return ' ';
    return ch;
  }).join('');
}

// ── 파싱 ─────────────────────────────────────────────────────────────────────
// 원본 body에서 [[빈칸]]과 {초성}을 파싱 (카드 저장/목록용)
function parseBody(text){
  const parts=[],re=new RegExp('\\[\\[([^\\]]+)\\]\\]|\\{([^}]+)\\}','g');let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push({type:'text',value:text.slice(last,m.index)});
    if(m[1]!==undefined)parts.push({type:'blank',value:m[1]});
    else parts.push({type:'cho',value:m[2]});
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push({type:'text',value:text.slice(last)});
  return parts;
}

// 모드별 파싱:
// 빈칸모드: {}와 그 안 내용 제거 → [[]] 기준 파싱
// 초성모드: [[]]와 그 안 내용 제거 → {} 기준 파싱, value는 toChosung 힌트로 표시
function parseForMode(text, mode){
  if(mode==='blank'){
    // {} 기호만 제거 (내부 텍스트 유지) 후 [[]] 파싱
    const cleaned=text.replace(new RegExp('\\{([^}]*)\\}','g'),'$1');
    const parts=[],re=new RegExp('\\[\\[([^\\]]+)\\]\\]','g');let last=0,m;
    while((m=re.exec(cleaned))!==null){
      if(m.index>last)parts.push({type:'text',value:cleaned.slice(last,m.index)});
      parts.push({type:'blank',value:m[1]});
      last=m.index+m[0].length;
    }
    if(last<cleaned.length)parts.push({type:'text',value:cleaned.slice(last)});
    return parts;
  } else {
    // [[]] 기호만 제거 (내부 텍스트 유지) 후 {} 파싱
    const cleaned=text.replace(new RegExp('\\[\\[([^\\]]+)\\]\\]','g'),'$1');
    const parts=[],re=new RegExp('\\{([^}]+)\\}','g');let last=0,m;
    while((m=re.exec(cleaned))!==null){
      if(m.index>last)parts.push({type:'text',value:cleaned.slice(last,m.index)});
      parts.push({type:'cho',value:m[1],hint:toChosung(m[1])});
      last=m.index+m[0].length;
    }
    if(last<cleaned.length)parts.push({type:'text',value:cleaned.slice(last)});
    return parts;
  }
}

function getActiveParts(parts,mode){
  if(mode==='blank')return parts.filter(p=>p.type==='blank');
  if(mode==='cho')return parts.filter(p=>p.type==='cho');
  return parts.filter(p=>p.type==='blank'||p.type==='cho'); // muk
}
const isDue=c=>!c.nextReview||new Date(c.nextReview)<=new Date();
function getSN(subjects,card){const s=subjects.find(function(s){return s.id===card.subjectId;});return s?s.name:'';}
function getCN(subjects,card){const s=subjects.find(function(s){return s.id===card.subjectId;});if(!s||!s.chapters)return '';const c=s.chapters.find(function(c){return c.id===card.chapterId;});return c?c.name:'';}
function getChapters(subjects,subId){const s=subjects.find(function(s){return s.id===subId;});return s&&s.chapters?s.chapters:[];}

// ── State ────────────────────────────────────────────────────────────────────
let S={
  data:loadData(),view:'home',
  selSub:null,selCh:null,
  cTitle:'',cHint:'',cBody:'',cPreview:false,
  // 학습
  studyMode:'blank', // 'blank'|'cho'|'muk'
  studyQueue:[],studyIdx:0,studyPhase:'answering',
  studyInputs:[],studyCb:0,studyLocked:new Set(),studyDone:0,
  studyResumePrompt:false,
  // 테스트
  testStarted:false,testDeck:[],testIdx:0,testPhase:'answering',
  testInputs:[],testCb:0,testResults:[],testSelSub:null,testSelCh:null,
  // 복습
  revStarted:false,revDeck:[],revIdx:0,revPhase:'answering',revRound:1,
  revInputs:[],revCb:0,revResults:[],revSelSub:null,revSelCh:null,
  revNewCount:10,
  // 카드 목록
  cardFs:'',cardFc:'',cardQ:'',cardEdit:null,cardExpanded:null,
};
function persist(data){S.data=data;saveData(data);render();}
function set(patch){Object.assign(S,patch);render();}

// ── DOM 헬퍼 ─────────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  if(typeof children==='string')e.innerHTML=children;
  else if(Array.isArray(children))children.flat().filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  else if(children instanceof Node)e.appendChild(children);
  return e;
}
function btn(text,cls,onClick){const b=el('button',{class:'btn '+(cls||''),onClick});b.textContent=text;return b;}
function lbl(text){return el('div',{class:'lbl'},text);}
function textWithBreaks(val){const sp=document.createElement('span');val.split('\n').forEach((l,i,a)=>{sp.appendChild(document.createTextNode(l));if(i<a.length-1)sp.appendChild(document.createElement('br'));});return sp;}
function sectionEl(label,children){return el('div',{class:'section'},[el('div',{class:'section-label'},[el('div',{class:'section-bar'}),el('div',{class:'section-title'},label)]),...(Array.isArray(children)?children:[children])]);}

// ── 확인 모달 ────────────────────────────────────────────────────────────────
function showConfirm(msg, onOk){
  const bg=el('div',{class:'confirm-modal'});
  const box=el('div',{class:'confirm-box'});
  const m=el('div',{class:'confirm-msg'});m.textContent=msg;box.appendChild(m);
  const row=el('div',{class:'flex',style:{justifyContent:'center',gap:'12px'}});
  const okBtn=btn('삭제','red',()=>{document.body.removeChild(bg);onOk();});
  const cancelBtn=btn('취소','',()=>document.body.removeChild(bg));
  row.appendChild(cancelBtn);row.appendChild(okBtn);box.appendChild(row);
  bg.appendChild(box);document.body.appendChild(bg);
}

// ── Header ───────────────────────────────────────────────────────────────────
function renderHeader(){
  const{view,data}=S;const dueCount=data.cards.filter(isDue).length;
  const banner=el('div',{class:'hdr-banner',onClick:()=>set({view:'home'})},[
    el('div',{class:'hdr-title'},'BLANKQUIZ'),

  ]);
  function nb(label,v,cls){
    const b=el('button',{class:'nav-btn '+(cls||'')+(view===v?' active':''),onClick:()=>{
      if(v==='create')set({view:v,selSub:null,selCh:null,cTitle:'',cHint:'',cBody:'',cPreview:false});
      else set({view:v});
    }});
    b.textContent=label;
    if(v==='review'&&dueCount>0)b.appendChild(el('span',{class:'due-badge'},String(dueCount)));
    return b;
  }
  const nav=el('div',{class:'hdr-nav'},[
    nb('홈','home'),nb('카드 만들기','create'),nb('카드 목록','cards'),
    nb('테스트','test','purple'),nb('복습','review','teal'),
  ]);
  return el('div',{style:{marginBottom:'20px'}},[banner,nav]);
}

// ── Home ─────────────────────────────────────────────────────────────────────
function renderHome(){
  const{data}=S;const{subjects,cards}=data;let nsVal='';
  const nsInp=el('input',{class:'inp',placeholder:'새 과목 이름 입력 후 Enter',value:'',onInput:e=>nsVal=e.target.value});
  const doAdd=()=>{if(!nsVal.trim())return;persist({subjects:[...subjects,{id:uid(),name:nsVal.trim(),chapters:[]}],cards});nsVal='';nsInp.value='';};
  nsInp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
  return el('div',{class:'fade'},[sectionEl('과목 관리',[
    el('div',{class:'flex',style:{marginBottom:'20px'}},[nsInp,btn('추가','accent',doAdd)]),
    subjects.length===0?el('div',{class:'empty'},'과목을 추가해서 학습을 시작하세요'):null,
    ...subjects.map(sub=>renderSubjectCard(sub,cards)),
  ].filter(Boolean))]);
}

function renderSubjectCard(sub,cards){
  const subCards=cards.filter(c=>c.subjectId===sub.id);
  let open=true;let chVal='';
  const wrapper=el('div',{style:{border:'2px solid #d4ecc0',borderRadius:'16px',marginBottom:'14px',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.06)'}});
  function rebuild(){
    wrapper.innerHTML='';
    const hdr=el('div',{class:'subj-hdr',onClick:()=>{open=!open;rebuild();}});
    hdr.appendChild(el('span',{style:{flex:'1',fontWeight:'800',fontSize:'15px'}},sub.name));
    hdr.appendChild(el('span',{style:{color:C.muted,fontSize:'12px',marginRight:'10px'}},`${(sub.chapters||[]).length}챕터 · ${subCards.length}문제`));
    hdr.appendChild(el('button',{style:{background:'none',border:'none',color:C.red,fontSize:'14px',padding:'2px 6px',cursor:'pointer'},onClick:e=>{e.stopPropagation();showConfirm(`'${sub.name}' 과목을 삭제할까요? 모든 카드가 삭제됩니다.`,()=>persist({subjects:S.data.subjects.filter(s=>s.id!==sub.id),cards:S.data.cards.filter(x=>x.subjectId!==sub.id)}));}},'X'));
    hdr.appendChild(el('span',{style:{color:C.muted,marginLeft:'6px',fontSize:'13px'}},open?'▲':'▼'));
    wrapper.appendChild(hdr);
    // 과목 전체 학습 버튼 (헤더 아래 별도 행)
    if(open){
      const subjBtnRow=el('div',{style:{padding:'8px 18px 0',background:'#f0f9e8',display:'flex',gap:'8px',flexWrap:'wrap'}});
      const subjCards=S.data.cards.filter(c=>c.subjectId===sub.id);
      if(subjCards.length>0){
        subjBtnRow.appendChild(btn('과목 전체 학습','small green',()=>{
          const saved=loadStudy();
          const same=saved&&saved.selSub===sub.id&&!saved.selCh&&saved.studyIdx>0;
          if(same){set({view:'study',selSub:sub.id,selCh:null,studyResumePrompt:true});}
          else{clearStudy();set({view:'study',selSub:sub.id,selCh:null,studyMode:'blank',studyQueue:[],studyIdx:0,studyPhase:'answering',studyInputs:[],studyCb:0,studyLocked:new Set(),studyDone:0,studyResumePrompt:false});}
        }));
      }
      if(subjBtnRow.children.length>0)wrapper.appendChild(subjBtnRow);
    }
    if(!open)return;
    const body=el('div',{class:'subj-body'});
    const chInp=el('input',{class:'inp',placeholder:'챕터 이름 입력 후 Enter',value:'',style:{marginBottom:'0'},onInput:e=>chVal=e.target.value});
    const doAddCh=()=>{if(!chVal.trim())return;const updated={...sub,chapters:[...(sub.chapters||[]),{id:uid(),name:chVal.trim()}]};persist({subjects:S.data.subjects.map(s=>s.id===sub.id?updated:s),cards:S.data.cards});};
    chInp.addEventListener('keydown',e=>{if(e.key==='Enter')doAddCh();});
    body.appendChild(el('div',{class:'flex',style:{marginBottom:'12px'}},[chInp,btn('추가','small',doAddCh)]));
    if(!(sub.chapters||[]).length)body.appendChild(el('div',{class:'empty small'},'챕터를 추가하세요'));
    (sub.chapters||[]).forEach(ch=>{
      const chCards=S.data.cards.filter(c=>c.subjectId===sub.id&&c.chapterId===ch.id);
      const dueCnt=chCards.filter(isDue).length;
      const row=el('div',{class:'ch-row'});
      row.appendChild(el('span',{style:{flex:'1',fontSize:'13px',fontWeight:'700'}},ch.name));
      row.appendChild(el('span',{style:{fontSize:'11px',color:C.muted}},`${chCards.length}문제`));
      if(dueCnt>0)row.appendChild(el('span',{class:'rbadge'},`복습 ${dueCnt}`));
      row.appendChild(btn('+ 카드','small',()=>set({view:'create',selSub:sub.id,selCh:ch.id,cTitle:'',cHint:'',cBody:'',cPreview:false})));
      row.appendChild(btn('학습','small green',()=>{
        const saved=loadStudy();
        const sameCh=saved&&saved.selSub===sub.id&&saved.selCh===ch.id&&saved.studyIdx>0;
        if(sameCh){
          set({view:'study',selSub:sub.id,selCh:ch.id,studyResumePrompt:true});
        } else {
          clearStudy();
          set({view:'study',selSub:sub.id,selCh:ch.id,
            studyMode:'blank',studyQueue:[],studyIdx:0,studyPhase:'answering',
            studyInputs:[],studyCb:0,studyLocked:new Set(),studyDone:0,
            studyResumePrompt:false});
        }
      }));
      row.appendChild(btn('삭제','small',()=>showConfirm(`'${ch.name}' 챕터를 삭제할까요?`,()=>{const updated={...sub,chapters:sub.chapters.filter(cc=>cc.id!==ch.id)};persist({subjects:S.data.subjects.map(s=>s.id===sub.id?updated:s),cards:S.data.cards.filter(x=>!(x.subjectId===sub.id&&x.chapterId===ch.id))});})));
      body.appendChild(row);
    });
    wrapper.appendChild(body);
  }
  rebuild();return wrapper;
}

// ── Create ───────────────────────────────────────────────────────────────────
function renderCreate(){
  const{data,selSub,selCh,cTitle,cHint,cBody,cPreview}=S;const{subjects,cards}=data;
  const chapters=getChapters(subjects,selSub);
  const box=el('div',{class:'card-box'});
  const grid=el('div',{class:'grid2',style:{marginBottom:'14px'}});

  subSel.appendChild(el('option',{value:''},'-- 과목 선택 --'));
  subjects.forEach(s=>{const o=el('option',{value:s.id},s.name);if(s.id===selSub)o.selected=true;subSel.appendChild(o);});
  const chSel=el('select',{class:'inp',onChange:e=>set({selCh:e.target.value})});
  chSel.appendChild(el('option',{value:''},'-- 챕터 선택 --'));
  if(selSub){chapters.forEach(c=>{const o=el('option',{value:c.id},c.name);if(c.id===selCh)o.selected=true;chSel.appendChild(o);});}else chSel.disabled=true;
  const d1=el('div');d1.appendChild(lbl('과목'));d1.appendChild(subSel);
  const d2=el('div');d2.appendChild(lbl('챕터'));d2.appendChild(chSel);
  grid.appendChild(d1);grid.appendChild(d2);box.appendChild(grid);
  box.appendChild(lbl('제목'));
  const tInp=el('input',{class:'inp',placeholder:'카드 제목...',value:cTitle,style:{marginBottom:'10px'},onInput:e=>S.cTitle=e.target.value});box.appendChild(tInp);
  box.appendChild(lbl('힌트 (선택)'));
  const hInp=el('input',{class:'inp',placeholder:'힌트...',value:cHint,style:{marginBottom:'10px'},onInput:e=>S.cHint=e.target.value});box.appendChild(hInp);
  box.appendChild(lbl('본문 — [[빈칸]] 또는 {초성} 지정'));
  const ta=el('textarea',{class:'inp',rows:'6',placeholder:'예: 민사에 관하여 {법률에 규정이 없으면 [[관습법]]에 의하고 [[관습법]]이 없으면 [[조리]]에 의한다}.\n→ 빈칸모드: 법률에 규정이 없으면 [빈칸]에 의하고 [빈칸]이 없으면 [빈칸]에 의한다.\n→ 초성모드: ㅂㄹㅇ ㄱㅈㅇ ㅇㅇㅁ ㄱㅅㅂㅇ ㅇㅎㄱ ㄱㅅㅂㅇ ㅇㅇㅁ ㅈㄹㅇ ㅇㅎㄷ.',onInput:e=>S.cBody=e.target.value});ta.value=cBody;box.appendChild(ta);
  const wrapBlank=btn('선택→[[빈칸]]','small',()=>{const s=ta.selectionStart,e=ta.selectionEnd;if(s===e)return;const next=ta.value.slice(0,s)+`[[${ta.value.slice(s,e)}]]`+ta.value.slice(e);ta.value=next;S.cBody=next;ta.focus();ta.setSelectionRange(s+2,e+2);});
  const wrapCho=btn('선택→{초성}','small teal',()=>{const s=ta.selectionStart,e=ta.selectionEnd;if(s===e)return;const next=ta.value.slice(0,s)+`{${ta.value.slice(s,e)}}`+ta.value.slice(e);ta.value=next;S.cBody=next;ta.focus();ta.setSelectionRange(s+1,e+1);});
  const prevBtn=btn(cPreview?'편집':'미리보기','small',()=>set({cPreview:!cPreview,cBody:ta.value,cTitle:tInp.value,cHint:hInp.value}));
  const saveBtn=btn('저장','accent',()=>{
    const t=tInp.value.trim(),h=hInp.value.trim(),b=ta.value.trim();
    if(!t||!b||!S.selSub||!S.selCh){alert('과목, 챕터, 제목, 본문을 모두 입력하세요.');return;}
    const pp=parseBody(b);
    if(!pp.some(p=>p.type==='blank'||p.type==='cho')){alert('본문에 [[빈칸]] 또는 {초성}을 하나 이상 지정하세요.');return;}
    S.cTitle='';S.cHint='';S.cBody='';S.cPreview=false;
    persist({subjects,cards:[...cards,{id:uid(),subjectId:S.selSub,chapterId:S.selCh,title:t,hint:h,body:b,created:new Date().toISOString()}]});

  if(cPreview&&cBody){

    const pb=el('div',{style:{marginTop:'16px',padding:'16px',background:C.surfAlt,borderRadius:'12px',border:'2px solid #d4ecc0',lineHeight:'1.9'}});

    pb.appendChild(el('div',{style:{fontSize:'11px',color:C.muted,marginBottom:'8px',fontWeight:'700'}},`미리보기 — 빈칸 ${bc}개 · 초성 ${cc}개`));
    parts.forEach(p=>{
      if(p.type==='blank')pb.appendChild(el('span',{class:'preview-blank'},'　　　'));
      else if(p.type==='cho')pb.appendChild(el('span',{class:'preview-cho'},toChosung(p.value)));
      else pb.appendChild(textWithBreaks(p.value));

  return el('div',{class:'fade'},[sec]);
}

// ── 초성/통암기 Body 렌더러 (단어별 밑줄) ────────────────────────────────────────
function renderChoBody(parts,phase,inputs,locked,ref,actives,onEnter,mode){
  const wrap=document.createElement('div');
  wrap.style.cssText='margin-bottom:20px';
  // result 화면: 정답 표시
  if(phase==='result'){
    const row=el('div',{class:'cho-word-row'});
    let ai=0;
    parts.forEach(p=>{
      if(p.type==='text'){
        // 텍스트는 띄어쓰기 기준으로 분리해서 표시
        const words=p.value.split(' ');
        words.forEach((w,wi)=>{
          if(w){const sp=el('span',{class:'cho-plain'});sp.textContent=w;row.appendChild(sp);}
          if(wi<words.length-1)row.appendChild(el('span',{class:'cho-space'}));
        });
        return;
      }
      // cho 또는 blank(muk) 파트
      const bIdx=ai++;
      const ok=(inputs[bIdx]||'').trim()===p.value.trim();
      // 단어별로 분리
      const words=p.value.split(' ');
      words.forEach((w,wi)=>{
        if(!w)return;
        const unit=el('span',{class:'cho-word-unit'});
        const iv=el('span',{style:{fontSize:'11px',fontWeight:'700',marginBottom:'1px',textAlign:'center',color:ok?C.green:C.red}});iv.textContent=ok?'':(inputs[bIdx]||'?');
        const ans=el('span',{style:{borderBottom:'2px solid '+(ok?C.green:C.red),padding:'1px 2px',fontSize:'15px',color:ok?C.green:C.red,minWidth:'20px',textAlign:'center',display:'inline-block'}});ans.textContent=w;
        unit.appendChild(iv);unit.appendChild(ans);row.appendChild(unit);
        if(wi<words.length-1)row.appendChild(el('span',{class:'cho-space'}));
      });
    });
    wrap.appendChild(row);return wrap;
  }
  // answering: 단어별 입력칸
  const row=el('div',{class:'cho-word-row'});
  let ai=0,allInputs=[],first=null;
  parts.forEach(p=>{
    if(p.type==='text'){
      const words=p.value.split(' ');
      words.forEach((w,wi)=>{
        if(w){const sp=el('span',{class:'cho-plain'});sp.textContent=w;row.appendChild(sp);}
        if(wi<words.length-1)row.appendChild(el('span',{class:'cho-space'}));
      });
      return;
    }
    const bIdx=ai++;
    const words=p.value.split(' ');
    words.forEach((w,wi)=>{
      if(!w)return;
      const unit=el('span',{class:'cho-word-unit'});
      // 초성 힌트 (통암기는 힌트 없음)
      const hintSpan=el('span',{class:'cho-word-hint'});
      hintSpan.textContent=(mode==='cho'&&p.hint)?toChosung(w):'';
      const wordIdx=allInputs.length;
      const inp=el('input',{class:'cho-word-inp'});
      inp.style.width=Math.max(20,w.replace(/[.,!?。]/g,'').length*15)+'px';
      inp.setAttribute('data-answer',w);
      inp.setAttribute('data-bidx',String(bIdx));
      inp.setAttribute('data-wordidx',String(wi));
      inp.setAttribute('data-totalwords',String(words.length));
      if(locked&&locked.has(bIdx)){
        inp.value=w;inp.disabled=true;inp.className='cho-word-inp bok';
      } else {
        inp.value=(inputs[bIdx]?inputs[bIdx].split(' ')[wi]||'':'');
        inp.addEventListener('keydown',function(e){
          if(e.key==='Backspace'&&inp.value===''){
            e.preventDefault();
            if(wordIdx>0){const prev=allInputs[wordIdx-1];prev.focus();const l=prev.value.length;prev.setSelectionRange(l,l);}
          }
        });
        inp.addEventListener('keyup',function(e){
          if(e.key===' '||e.key==='Spacebar'||e.key==='Enter'){
            inp.value=inp.value.replace(/ /g,'');
            if(wordIdx+1<allInputs.length)allInputs[wordIdx+1].focus();
            else onEnter();
          }
        });
      }
      allInputs.push(inp);
      if(!first&&!inp.disabled)first=inp;
      unit.appendChild(hintSpan);unit.appendChild(inp);row.appendChild(unit);
      if(wi<words.length-1)row.appendChild(el('span',{class:'cho-space'}));
    });
  });
  wrap.appendChild(row);
  if(ref)ref.el=first;
  // onInput 집계: 모든 입력 수집해서 actives에 저장
  allInputs.forEach(inp=>{
    inp.addEventListener('input',function(){
      // 각 cho 파트의 단어들을 모아서 inputs 배열 업데이트
      let ai2=0;
      parts.forEach(p=>{
        if(p.type==='text')return;
        const ws=p.value.split(' ');
        const vals=ws.map((_,wi2)=>{
          const found=allInputs.find(i=>parseInt(i.getAttribute('data-bidx'))===ai2&&parseInt(i.getAttribute('data-wordidx'))===wi2);
          return found?found.value:'';
        });
        S.studyInputs[ai2]=vals.join(' ');
        ai2++;
      });
    });
  });
  return wrap;
}

// ── QuizBody 렌더러 ───────────────────────────────────────────────────────────
// parts는 parseForMode(body, mode)의 결과 (모드별 전처리 완료)
// blank모드: text|blank 타입만 존재
// cho모드:   text|cho 타입만 존재, cho.hint = 초성 힌트 문자열
function renderQuizBody(parts,phase,inputs,cb,locked,ref,onInput,onEnter,mode){
  const wrap=document.createElement('div');wrap.style.cssText='line-height:2.4;font-size:15px;margin-bottom:20px';
  let ai=0,first=null;
  parts.forEach(p=>{
    if(p.type==='text'){wrap.appendChild(textWithBreaks(p.value));return;}
    // 입력 대상 파트 (blank 또는 cho)
    const bIdx=ai++;
    const displayVal=p.value; // 정답 텍스트
    if(phase==='result'){
      const ok=(inputs[bIdx]||'').trim()===displayVal.trim();
      const sp=el('div',{class:ok?'bok':'bng'});
      sp.appendChild(el('span',{class:'iv'},inputs[bIdx]||'(공백)'));
      sp.appendChild(el('span',{class:'ans'},displayVal));
      wrap.appendChild(sp);return;
    }
    if(locked&&locked.has(bIdx)){wrap.appendChild(el('span',{class:'blank-locked'},displayVal));return;}
    if(bIdx<cb){wrap.appendChild(el('span',{class:'blank-filled'},inputs[bIdx]||'　'));return;}
    if(bIdx===cb){
      if(p.hint){
        // cho모드: 초성 위에 작게, 입력칸 아래 (너비는 힌트/입력값 중 큰 것 기준)
        const cw=el('span',{class:'cho-wrap'});
        cw.appendChild(el('span',{class:'cho-label'},p.hint));
        const sp=el('span',{class:'blank-wrap'});
        const initW=Math.max(p.hint.length*13+16,60);
        const input=el('input',{class:'blank-input',value:inputs[bIdx]||'',
          onInput:e=>{
            onInput(e.target.value);
            input.style.width=Math.max(initW,(e.target.value.length+2)*10)+'px';
          },
          onKeydown:e=>{if(e.key==='Enter')onEnter();}});
        input.style.width=Math.max(initW,((inputs[bIdx]||'').length+2)*10)+'px';
        sp.appendChild(input);cw.appendChild(sp);wrap.appendChild(cw);if(!first)first=input;
      } else {
        const sp=el('span',{class:'blank-wrap'});
        const input=el('input',{class:'blank-input',value:inputs[bIdx]||'',
          onInput:e=>{onInput(e.target.value);input.style.width=Math.max(60,(e.target.value.length+2)*10)+'px';},
          onKeydown:e=>{if(e.key==='Enter')onEnter();}});
        input.style.width=Math.max(60,((inputs[bIdx]||'').length+2)*10)+'px';
        sp.appendChild(input);wrap.appendChild(sp);if(!first)first=input;
      }
      return;
    }
    // 아직 안 푼 빈칸
    if(p.hint){
      const cw=el('span',{class:'cho-wrap'});
      cw.appendChild(el('span',{class:'cho-label'},p.hint));
      cw.appendChild(el('span',{class:'blank-slot'},'　　'));
      wrap.appendChild(cw);
    } else {
      wrap.appendChild(el('span',{class:'blank-slot'},'　　'));
    }
  });
  if(ref)ref.el=first;return wrap;
}

// ── Study ────────────────────────────────────────────────────────────────────
function renderStudy(){
  const{data,selSub,selCh,studyMode,studyResumePrompt}=S;
  const subjects=data.subjects;
  const base=data.cards.filter(c=>(!selSub||c.subjectId===selSub)&&(!selCh||c.chapterId===selCh));
  if(!base.length)return el('div',{style:{textAlign:'center',padding:'60px'}},[el('div',{style:{color:C.muted}},'이 챕터에 카드가 없습니다'),el('div',{style:{marginTop:'20px'}},[btn('홈으로','',()=>set({view:'home'}))])]);

  // 이어하기 선택 화면
  if(studyResumePrompt){
    const saved=loadStudy();
    const box=el('div',{class:'resume-box'});
    box.appendChild(el('div',{style:{fontWeight:'800',fontSize:'16px',marginBottom:'8px',color:C.text}},'이전 학습 기록이 있어요'));
    box.appendChild(el('div',{style:{fontSize:'13px',color:C.muted,marginBottom:'16px'}},`${saved.studyDone||0} / ${base.length}개 완료`));
    const btns=el('div',{class:'flex'});
    btns.appendChild(btn('이어서 학습','green',()=>{
      S.studyQueue=base;S.studyIdx=saved.studyIdx||0;S.studyDone=saved.studyDone||0;
      S.studyMode=saved.studyMode||'blank';S.studyPhase='answering';
      S.studyInputs=[];S.studyCb=0;S.studyLocked=new Set();S.studyResumePrompt=false;
      render();
    }));
    btns.appendChild(btn('처음부터 시작','',()=>{clearStudy();set({studyResumePrompt:false,studyQueue:base,studyIdx:0,studyDone:0,studyMode:'blank',studyPhase:'answering',studyInputs:[],studyCb:0,studyLocked:new Set()});}));
    box.appendChild(btns);
    return el('div',{class:'fade'},[box]);
  }

  // 큐 초기화
  if(!S.studyQueue.length)S.studyQueue=base;
  const queue=S.studyQueue;

  // 완료 화면
  if(S.studyIdx>=queue.length){
    clearStudy();
    const modeLabel={'blank':'빈칸 완전 숙달!','cho':'초성 완전 숙달!','muk':'통암기 완료!'};
    const modeColor={'blank':C.green,'cho':C.teal,'muk':C.purple};
    const wrap=el('div',{style:{textAlign:'center',padding:'40px 20px',animation:'fadeIn .4s ease'}});
    wrap.appendChild(el('div',{style:{fontSize:'32px',fontWeight:'800',color:modeColor[studyMode]||C.green,marginBottom:'8px'}},modeLabel[studyMode]||'완료!'));
    wrap.appendChild(el('div',{style:{color:C.muted,marginBottom:'28px'}},`${base.length}개 카드 완료`));
    const opts=el('div',{class:'complete-opts'});
    const goMode=(mode,label,cls)=>btn(label,cls,()=>{S.studyQueue=base;set({studyMode:mode,studyIdx:0,studyDone:0,studyPhase:'answering',studyInputs:[],studyCb:0,studyLocked:new Set()});});
    const hasCho=base.some(c=>parseBody(c.body).some(p=>p.type==='cho'));
    if(studyMode==='blank'){
      if(hasCho)opts.appendChild(goMode('cho','초성 학습으로 이어하기','teal'));
      opts.appendChild(goMode('muk','통암기 학습으로 이어하기','purple'));
      opts.appendChild(goMode('blank','빈칸 다시 학습','green'));
    } else if(studyMode==='cho'){
      opts.appendChild(goMode('muk','통암기 학습으로 이어하기','purple'));
      opts.appendChild(goMode('blank','빈칸 학습','green'));
      opts.appendChild(goMode('cho','초성 다시 학습','teal'));
    } else {
      opts.appendChild(goMode('blank','빈칸 학습','green'));
      if(hasCho)opts.appendChild(goMode('cho','초성 학습','teal'));
      opts.appendChild(goMode('muk','통암기 다시 학습','purple'));
    }
    opts.appendChild(btn('홈으로','',()=>set({view:'home'})));
    wrap.appendChild(opts);return wrap;
  }

  const card=queue[S.studyIdx];
  const parts=parseForMode(card.body,studyMode);
  const actives=getActiveParts(parts,studyMode);
  // 현재 모드에서 활성 파트가 없는 카드는 스킵
  if(!actives.length){
    S.studyIdx++;S.studyDone++;render();return null;
  }

  const sn=getSN(subjects,card);
  const cn=getCN(subjects,card);
  const progressPct=base.length?(S.studyDone/base.length)*100:0;
  const unlockedCount=actives.length-S.studyLocked.size;
  const nextUnlocked=from=>{let i=from;while(i<actives.length&&S.studyLocked.has(i))i++;return i;};
  const hi=val=>{const n=[...S.studyInputs];n[S.studyCb]=val;S.studyInputs=n;};
  const ne=()=>{
    if(S.studyPhase==='result'){
      // 통암기: 맞든 틀리든 다음 카드
      if(studyMode==='muk'){
        const nd=S.studyDone+1,ni=S.studyIdx+1;
        saveStudy({selSub,selCh,studyIdx:ni,studyDone:nd,studyMode});
        if(ni>=queue.length)clearStudy();
        set({studyDone:nd,studyIdx:ni,studyPhase:'answering',studyInputs:[],studyCb:0,studyLocked:new Set()});
        return;
      }
      const allOk=actives.every((a,i)=>(S.studyInputs[i]||'').trim()===a.value.trim());
      if(allOk){
        const nd=S.studyDone+1,ni=S.studyIdx+1;
        saveStudy({selSub,selCh,studyIdx:ni,studyDone:nd,studyMode});
        if(ni>=queue.length)clearStudy();
        set({studyDone:nd,studyIdx:ni,studyPhase:'answering',studyInputs:[],studyCb:0,studyLocked:new Set()});
      } else {
        const nl=new Set(actives.map((_,i)=>i).filter(i=>(S.studyInputs[i]||'').trim()===actives[i].value.trim()));
        const ni2=actives.map((a,i)=>nl.has(i)?a.value:'');
        const fi=ni2.findIndex((_,i)=>!nl.has(i));
        set({studyPhase:'answering',studyLocked:nl,studyInputs:ni2,studyCb:fi>=0?fi:0});
      }
      return;
    }
    // cho/muk 모드는 단어별 입력창이 한 화면에 모두 표시 → 바로 채점
    if(studyMode==='cho'||studyMode==='muk'){
      set({studyPhase:'result'});
    } else {
      const next=nextUnlocked(S.studyCb+1);
      if(next<actives.length)set({studyCb:next});else set({studyPhase:'result'});
    }
  };

  const ref={el:null};
  const bodyEl=(studyMode==='cho'||studyMode==='muk')&&S.studyPhase!=='result'
    ?renderChoBody(parts,S.studyPhase,S.studyInputs,S.studyLocked,ref,actives,ne,studyMode)
    :renderQuizBody(parts,S.studyPhase,S.studyInputs,S.studyCb,S.studyLocked,ref,hi,ne,studyMode);
  setTimeout(()=>ref.el&&ref.el.focus(),80);

  const correctNow=actives.filter((_,i)=>(S.studyInputs[i]||'').trim()===actives[i].value.trim()).length;
  const isMuk=studyMode==='muk';
  const isChoMode=studyMode==='cho';
  const modeColor=isMuk?C.purple:isChoMode?C.teal:C.green;
  const modeCls=isMuk?'mb':isChoMode?'tb':'gb';

  const wrap=el('div',{class:'fade'});
  // 모드 배지
  wrap.appendChild(el('span',{class:`mode-badge ${isChoMode?'cho':'blank'}`},isChoMode?'초성 학습':'빈칸 학습'));
  // 진행바
  const pb=el('div',{class:'flex',style:{marginBottom:'8px'}});
  pb.appendChild(el('span',{style:{fontSize:'12px',color:C.muted,fontWeight:'700'}},`${sn} · ${cn}`));
  const bar=el('div',{class:'progress-bar'});bar.appendChild(el('div',{class:'progress-fill',style:{width:`${progressPct}%`,background:modeColor}}));pb.appendChild(bar);
  pb.appendChild(el('span',{style:{fontSize:'12px',color:modeColor,fontWeight:'800'}},`${S.studyDone}/${base.length} 완료`));
  wrap.appendChild(pb);
  if(S.studyLocked.size>0)wrap.appendChild(el('div',{class:'locked-notice'},`초록 빈칸은 이미 맞췄습니다 · 남은 ${unlockedCount}개`));
  const qcard=el('div',{class:`quiz-card ${S.studyLocked.size>0?'rb':modeCls}`});
  qcard.appendChild(el('div',{style:{fontWeight:'800',fontSize:'20px',marginBottom:'10px',color:C.text}},card.title));
  if(card.hint)qcard.appendChild(el('div',{class:'hint-box'},`힌트: ${card.hint}`));
  qcard.appendChild(bodyEl);
  const footer=el('div',{style:{paddingTop:'12px',borderTop:'1px dashed #f0c8a0'}});
  if(S.studyPhase==='answering'){
    const fl=el('div',{class:'flex'});
    if(isMuk||isChoMode){
      // cho/muk: 전체 입력칸이 한 번에 표시 → 채점 버튼만
      fl.appendChild(el('span',{style:{fontSize:'13px',color:C.muted,fontWeight:'700'}},`${isMuk?'통암기':'초성'} ${actives.length}개`));
      fl.appendChild(btn('채점',isMuk?'purple':'teal',ne));
    } else {
      const ulIdx=[...Array(actives.length).keys()].filter(i=>!S.studyLocked.has(i));
      fl.appendChild(el('span',{style:{fontSize:'13px',color:C.muted,fontWeight:'700'}},`빈칸 ${ulIdx.indexOf(S.studyCb)+1} / ${unlockedCount}`));
      fl.appendChild(btn(nextUnlocked(S.studyCb+1)<actives.length?'다음':'채점','green',ne));
    }
    footer.appendChild(fl);
  } else {
    const fl=el('div',{class:'flex'});
    fl.appendChild(el('span',{style:{fontWeight:'800'}},[el('span',{style:{color:correctNow===actives.length?C.green:C.red,fontSize:'18px'}},String(correctNow)),el('span',{style:{color:C.muted}},` / ${actives.length} 정답`)]));
    fl.appendChild(btn(isMuk?'다음 카드':(correctNow===actives.length?'다음 카드':'다시 풀기'),isMuk?'purple':correctNow===actives.length?'green':'red',ne));
    footer.appendChild(fl);
    if(!isMuk&&correctNow<actives.length)footer.appendChild(el('div',{class:'retry-notice'},'전부 맞혀야 다음 카드로 넘어갑니다'));
  }
  qcard.appendChild(footer);wrap.appendChild(qcard);return wrap;
}

    box.appendChild(btn('테스트 시작','purple',()=>{

    // 테스트 이력 저장
    try{const hist=JSON.parse(localStorage.getItem('bq_testhist')||'[]');hist.unshift({date:new Date().toISOString(),subjectId:testSelSub,chapterId:testSelCh,score:pct,correct,total,count:testDeck.length});localStorage.setItem('bq_testhist',JSON.stringify(hist.slice(0,50)));}catch{}

    center.appendChild(el('div',{style:{color:C.muted,fontSize:'14px'}},`${correct} / ${total} 빈칸 정답 · ${testDeck.length}문제 · ${new Date().toLocaleDateString('ko-KR')}`));
    wrap.appendChild(center);
    if(wrong.length){wrap.appendChild(el('div',{style:{fontSize:'13px',fontWeight:'800',color:C.red,marginBottom:'10px'}},`오답 카드 (${wrong.length}개)`));wrong.forEach(r=>{const wc=el('div',{class:'wrong-card'});wc.appendChild(el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'4px'}},r.card.title));wc.appendChild(el('div',{style:{fontSize:'12px',color:C.muted}},`${r.correct}/${r.total} 정답`));wrap.appendChild(wc);});}
    const btns=el('div',{class:'flex',style:{justifyContent:'center',marginTop:'16px'}});

  const hi=val=>{const n=[...testInputs];n[testCb]=val;S.testInputs=n;};
  const cor=i=>(testInputs[i]||'').trim()===(blanks[i]?blanks[i].value:'').trim();
  const ne=()=>{if(testPhase==='result'){const cc=blanks.filter((_,i)=>cor(i)).length;set({testResults:[...testResults,{card,correct:cc,total:blanks.length}],testIdx:testIdx+1,testPhase:'answering',testInputs:[],testCb:0});return;}if(testCb<blanks.length-1)set({testCb:testCb+1});else set({testPhase:'result'});};
  const ref={el:null};const bodyEl=renderQuizBody(parts,testPhase,testInputs,testCb,null,ref,hi,ne,'blank');setTimeout(()=>ref.el&&ref.el.focus(),80);
  const wrap=el('div',{class:'fade'});

  const footer=el('div',{style:{paddingTop:'12px',borderTop:'1px dashed #f0c8a0'}});

// ── Review ───────────────────────────────────────────────────────────────────
function renderReview(){
  const{data,revStarted,revDeck,revIdx,revPhase,revInputs,revCb,revResults,revSelSub,revSelCh,revNewCount,revRound}=S;
  const{subjects,cards}=data;
  const allCh=subjects.find(s=>s.id===revSelSub)?.chapters||[];

  if(!revStarted){
    const filt=c=>{if(revSelSub&&c.subjectId!==revSelSub)return false;if(revSelCh&&c.chapterId!==revSelCh)return false;return true;};
    // 오늘 복습 카드: nextReview 있고 오늘 이하 (미이수 자동 이월 포함)
    const dueCards=cards.filter(c=>c.nextReview&&isDue(c)&&filt(c));
    // 신규 카드: nextReview 없음 (복습 전이면 이월 없이 대기)
    const newCards=cards.filter(c=>!c.nextReview&&filt(c));
    const todayNew=Math.min(newCards.length,S.revNewCount);

    // 복습/신규 둘 다 없을 때만 "없음" 표시
    // nextReview가 미래인 카드 개수 확인
    const futureCards=cards.filter(c=>c.nextReview&&!isDue(c)&&filt(c));
    const nextDate=futureCards.length>0
      ?futureCards.reduce((min,c)=>c.nextReview<min?c.nextReview:min,futureCards[0].nextReview)
      :null;
    if(!dueCards.length&&!newCards.length){
      const wrap=el('div',{style:{textAlign:'center',padding:'60px'}});
      wrap.appendChild(el('div',{style:{fontSize:'26px',fontWeight:'800',color:C.teal,marginBottom:'8px'}},'오늘 복습 없음'));
      if(nextDate){
        const d=new Date(nextDate);
        wrap.appendChild(el('div',{style:{color:C.muted,marginBottom:'6px'}},'다음 복습: '+d.toLocaleDateString('ko-KR')));
        wrap.appendChild(el('div',{style:{fontSize:'13px',color:C.muted,marginBottom:'28px'}},futureCards.length+'개 대기 중'));
      } else {
        wrap.appendChild(el('div',{style:{color:C.muted,marginBottom:'28px'}},'복습할 카드가 없습니다'));
      }
      wrap.appendChild(btn('홈으로','teal',()=>set({view:'home'})));
      return wrap;
    }

    const box=el('div',{class:'card-box'});
    const grid=el('div',{class:'grid2',style:{marginBottom:'16px'}});
    const subSel=el('select',{class:'inp',onChange:e=>set({revSelSub:e.target.value,revSelCh:null})});
    subSel.appendChild(el('option',{value:''},'전체 과목'));
    subjects.forEach(s=>{const o=el('option',{value:s.id},s.name);if(s.id===revSelSub)o.selected=true;subSel.appendChild(o);});
    const chSel=el('select',{class:'inp',onChange:e=>set({revSelCh:e.target.value})});
    chSel.appendChild(el('option',{value:''},'전체 챕터'));
    if(revSelSub){allCh.forEach(c=>{const o=el('option',{value:c.id},c.name);if(c.id===revSelCh)o.selected=true;chSel.appendChild(o);});}
    else chSel.disabled=true;
    const d1=el('div');d1.appendChild(lbl('과목'));d1.appendChild(subSel);
    const d2=el('div');d2.appendChild(lbl('챕터'));d2.appendChild(chSel);
    grid.appendChild(d1);grid.appendChild(d2);box.appendChild(grid);

    const nRow=el('div',{class:'flex',style:{marginBottom:'16px',alignItems:'center'}});
    nRow.appendChild(el('span',{style:{fontSize:'13px',color:C.muted,fontWeight:'700'}},'오늘 신규 카드:'));
    const nInp=el('input',{class:'inp',type:'number',value:String(S.revNewCount),
      style:{width:'70px',marginBottom:'0',textAlign:'center'},onInput:e=>S.revNewCount=parseInt(e.target.value)||10});
    nRow.appendChild(nInp);
    nRow.appendChild(el('span',{style:{fontSize:'13px',color:C.muted,fontWeight:'700'}},'개'));
    box.appendChild(nRow);

    const info=el('div',{class:'start-info'});
    const l1=el('div',{style:{marginBottom:'4px'}});l1.textContent='복습 카드: '+dueCards.length+'개 (미이수 이월 포함)';info.appendChild(l1);
    const l2=el('div',{});l2.textContent='신규 카드: '+todayNew+'개 (대기 '+newCards.length+'개 · 미복습 이월 없음)';info.appendChild(l2);
    const l3=el('div',{style:{marginTop:'4px',fontSize:'12px',color:C.muted}});l3.textContent='복습 완료 후 신규 카드 출제 · 각 카드 2회 입력';info.appendChild(l3);
    box.appendChild(info);

    // 기존 학습 중 SM-2가 돌아간 카드가 있을 때 안내
    const legacyCards=cards.filter(c=>c.nextReview&&!isDue(c)&&filt(c));
    if(legacyCards.length>0&&!newCards.length&&!dueCards.length){
      const legacyBox=el('div',{style:{padding:'10px 14px',background:'rgba(249,224,122,.2)',border:'1px dashed #f9e07a',borderRadius:'10px',marginBottom:'12px',fontSize:'12px',color:C.muted,fontWeight:'700'}});
      legacyBox.textContent=legacyCards.length+'개 카드가 미래 복습 일정으로 잡혀 있습니다. (이전 학습 모드에서 SM-2가 적용됨)';
      const resetBtn=btn('복습 일정 초기화 (신규로 되돌리기)','small',()=>{
        const updated={...S.data,cards:S.data.cards.map(c=>{
          if(!filt(c))return c;
          const{nextReview,lastReview,interval,ease,reps,...rest}=c;
          return rest;
        })};
        persist(updated);
      });
      resetBtn.style.marginTop='8px';resetBtn.style.display='block';
      legacyBox.appendChild(resetBtn);
      box.appendChild(legacyBox);
    }
    box.appendChild(btn('복습 시작','teal',()=>{

      const deck=[...shuffle(dueCards),...shuffle(newCards).slice(0,S.revNewCount)];
      set({revStarted:true,revDeck:deck,revIdx:0,revPhase:'answering',revInputs:[],revCb:0,revResults:[],revRound:1});
    }));
    return el('div',{class:'fade'},[sectionEl('오늘의 복습',[box])]);
  }

  // 완료
  if(revIdx>=revDeck.length){
    const total=revResults.reduce((s,r)=>s+r.total,0),correct=revResults.reduce((s,r)=>s+r.correct,0),pct=total>0?Math.round(correct/total*100):0;
    const wrong=revResults.filter(r=>r.correct<r.total);
    const wrap=el('div',{});
    const center=el('div',{style:{textAlign:'center',marginBottom:'24px'}});
    center.appendChild(el('div',{style:{fontSize:'32px',fontWeight:'800',color:C.teal,marginBottom:'8px'}},'오늘 복습 완료!'));
    center.appendChild(el('div',{class:'score-big',style:{color:pct>=80?C.green:pct>=60?C.yellow:C.red}},pct+'점'));
    center.appendChild(el('div',{style:{color:C.muted,fontSize:'14px'}},correct+'/'+total+' 정답 · '+revDeck.length+'카드'));
    wrap.appendChild(center);
    if(wrong.length){
      const wt=el('div',{style:{fontSize:'13px',fontWeight:'800',color:C.red,marginBottom:'10px'}});wt.textContent='오답 카드 ('+wrong.length+'개)';wrap.appendChild(wt);
      wrong.forEach(r=>{const wc=el('div',{class:'wrong-card'});const wt2=el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'4px'}});wt2.textContent=r.card.title;wc.appendChild(wt2);const ws=el('div',{style:{fontSize:'12px',color:C.muted}});ws.textContent=r.correct+'/'+r.total+' 정답';wc.appendChild(ws);wrap.appendChild(wc);});
    }
    const btns=el('div',{class:'flex',style:{justifyContent:'center',marginTop:'16px'}});
    btns.appendChild(btn('홈으로','teal',()=>set({view:'home',revStarted:false})));
    wrap.appendChild(btns);
    wrap.appendChild(el('div',{class:'info-box'},'망각곡선 복습 주기: 1→3→7→14→30→60→120일'));
    return wrap;
  }

  // 진행 중
  const card=revDeck[revIdx];
  const isNewCard=!card.nextReview; // 신규 카드 여부 (시작 시점 기준)
  const parts=parseForMode(card.body,'blank');
  const blanks=parts.filter(p=>p.type==='blank');
  const sn=getSN(subjects,card),cn=getCN(subjects,card);
  const isRound2=revRound===2;

  const hi=val=>{const n=[...revInputs];n[revCb]=val;S.revInputs=n;};
  const cor=i=>(revInputs[i]||'').trim()===(blanks[i]?blanks[i].value:'').trim();
  const ne=()=>{
    if(revPhase==='result'){
      const cc=blanks.filter((_,i)=>cor(i)).length;
      if(!isRound2){
        // 1회차: SM-2 업데이트 후 2회차
        const q=cc===blanks.length?2:cc>0?1:0;
        persist({...S.data,cards:S.data.cards.map(c=>c.id===card.id?{...c,...getNextReview(c,q)}:c)});
        set({revPhase:'answering',revInputs:[],revCb:0,revRound:2});
      } else {
        // 2회차: 다음 카드
        set({revResults:[...revResults,{card,correct:cc,total:blanks.length}],revIdx:revIdx+1,revPhase:'answering',revInputs:[],revCb:0,revRound:1});
      }
      return;
    }
    if(revCb<blanks.length-1)set({revCb:revCb+1});else set({revPhase:'result'});
  };

  const ref={el:null};const bodyEl=renderQuizBody(parts,revPhase,revInputs,revCb,null,ref,hi,ne);
  setTimeout(()=>ref.el&&ref.el.focus(),80);

  // 복습/신규 구분선 위치 (revDeck에서 신규 시작 인덱스)
  const dueCount=revDeck.filter(c=>c.nextReview).length;
  const sectionLabel=revIdx<dueCount?'복습':'신규';
  const sectionColor=revIdx<dueCount?C.teal:C.accent;

  const wrap=el('div',{class:'fade'});
  const pb=el('div',{class:'flex',style:{marginBottom:'6px'}});
  pb.appendChild(el('span',{style:{fontSize:'12px',color:C.muted,fontWeight:'700'}},sn+' · '+cn));
  const bar=el('div',{class:'progress-bar'});bar.appendChild(el('div',{class:'progress-fill',style:{width:((revIdx/revDeck.length)*100)+'%',background:sectionColor}}));pb.appendChild(bar);
  pb.appendChild(el('span',{style:{fontSize:'12px',color:sectionColor,fontWeight:'700'}},(revIdx+1)+'/'+revDeck.length));
  wrap.appendChild(pb);

  const badge=el('div',{style:{fontSize:'11px',fontWeight:'800',marginBottom:'6px'}});
  badge.style.color=isRound2?C.purple:sectionColor;
  badge.textContent=(sectionLabel==='신규'?'🆕 신규':'📚 복습')+(isRound2?' · 2회차 (즉시 복습)':' · 1회차');
  wrap.appendChild(badge);

  const qcard=el('div',{class:'quiz-card tb'});
  const tr=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px',flexWrap:'wrap',gap:'8px'}});
  tr.appendChild(el('div',{style:{fontWeight:'800',fontSize:'20px',color:C.text}},card.title));
  tr.appendChild(el('span',{class:'tag-sm'},sn+' · '+cn));
  qcard.appendChild(tr);
  if(card.hint)qcard.appendChild(el('div',{class:'hint-box'},'힌트: '+card.hint));
  qcard.appendChild(bodyEl);

  const footer=el('div',{style:{paddingTop:'12px',borderTop:'1px dashed #f0c8a0'}});
  if(revPhase==='answering'){
    const fl=el('div',{class:'flex'});
    fl.appendChild(el('span',{style:{fontSize:'13px',color:C.muted,fontWeight:'700'}},'빈칸 '+(revCb+1)+'/'+blanks.length));
    fl.appendChild(btn(revCb<blanks.length-1?'다음 빈칸':'채점','teal',ne));
    footer.appendChild(fl);
  } else {
    const cc=blanks.filter((_,i)=>cor(i)).length;
    const fl=el('div',{class:'flex'});
    fl.appendChild(el('span',{style:{fontWeight:'800'}},[el('span',{style:{color:cc===blanks.length?C.green:C.red,fontSize:'18px'}},String(cc)),el('span',{style:{color:C.muted}},' / '+blanks.length+' 정답')]));
    if(!isRound2)fl.appendChild(el('span',{style:{fontSize:'12px',color:C.muted,fontWeight:'700'}},'다음 복습: '+(card.interval||1)+'일 후'));
    fl.appendChild(btn(isRound2?'다음 카드':'2회차 시작',isRound2?'teal':'purple',ne));
    footer.appendChild(fl);
  }
  qcard.appendChild(footer);wrap.appendChild(qcard);return wrap;
}

function renderCards(){
  const{data,cardFs,cardFc,cardQ,cardEdit,cardExpanded}=S;const{subjects,cards}=data;
  const chapters=getChapters(subjects,cardFs);
  const filtered=cards.filter(c=>{if(cardFs&&c.subjectId!==cardFs)return false;if(cardFc&&c.chapterId!==cardFc)return false;if(cardQ){const q=cardQ.toLowerCase();return c.title.toLowerCase().includes(q)||c.body.toLowerCase().includes(q);}return true;});
  const getSN2=c=>getSN(subjects,c);const getCN2=c=>getCN(subjects,c);
  const wrap=el('div',{class:'fade'});
  if(cardEdit)wrap.appendChild(renderEditModal(cardEdit,subjects,cards));
  const filterGrid=el('div',{class:'grid3',style:{marginBottom:'16px'}});
  const subSel=el('select',{class:'inp',style:{marginBottom:'0'},onChange:e=>set({cardFs:e.target.value,cardFc:''})});subSel.appendChild(el('option',{value:''},'전체'));subjects.forEach(s=>{const o=el('option',{value:s.id},s.name);if(s.id===cardFs)o.selected=true;subSel.appendChild(o);});
  const chSel=el('select',{class:'inp',style:{marginBottom:'0'},onChange:e=>set({cardFc:e.target.value})});chSel.appendChild(el('option',{value:''},'전체'));if(cardFs){chapters.forEach(c=>{const o=el('option',{value:c.id},c.name);if(c.id===cardFc)o.selected=true;chSel.appendChild(o);});}else chSel.disabled=true;
  const searchInp=el('input',{class:'inp',style:{marginBottom:'0'},placeholder:'검색...',value:cardQ,onInput:e=>set({cardQ:e.target.value})});
  const d1=el('div');d1.appendChild(lbl('과목'));d1.appendChild(subSel);const d2=el('div');d2.appendChild(lbl('챕터'));d2.appendChild(chSel);const d3=el('div');d3.appendChild(lbl('검색'));d3.appendChild(searchInp);
  filterGrid.appendChild(d1);filterGrid.appendChild(d2);filterGrid.appendChild(d3);
  const sec=sectionEl(`카드 목록 (${filtered.length}개)`,[filterGrid]);
  if(!filtered.length)sec.appendChild(el('div',{class:'empty'},'카드가 없습니다'));
  filtered.forEach(card=>{
    const parts=parseBody(card.body);const bc=parts.filter(p=>p.type==='blank').length;const cc=parts.filter(p=>p.type==='cho').length;const isExp=cardExpanded===card.id;const due=isDue(card);
    const cardEl=el('div',{style:{border:`2px solid ${isExp?C.accent:C.border}`,borderRadius:'14px',marginBottom:'10px',overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.05)'}});
    const hdr=el('div',{style:{display:'flex',alignItems:'center',padding:'11px 16px',background:isExp?'rgba(224,123,106,.06)':'#fff8f0',gap:'10px',flexWrap:'wrap'}});
    const info=el('div',{style:{cursor:'pointer',flex:'1',minWidth:'0'},onClick:()=>set({cardExpanded:isExp?null:card.id})});
    info.appendChild(el('div',{style:{fontWeight:'800',fontSize:'14px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},card.title));
    const sub2=el('div',{style:{fontSize:'11px',color:C.muted,marginTop:'3px',fontWeight:'700'}},`${getSN2(card)} · ${getCN2(card)} · 빈칸 ${bc}${cc>0?' · 초성 '+cc:''}`);if(due)sub2.appendChild(el('span',{class:'due-tag'},'복습 대기'));info.appendChild(sub2);
    hdr.appendChild(info);hdr.appendChild(btn('수정','small',()=>set({cardEdit:card})));hdr.appendChild(el('button',{style:{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:'15px',padding:'2px 6px'},onClick:()=>showConfirm(`'${card.title}' 카드를 삭제할까요?`,()=>persist({subjects,cards:cards.filter(x=>x.id!==card.id)}))},'X'));hdr.appendChild(el('span',{style:{color:C.muted,cursor:'pointer',fontSize:'13px'},onClick:()=>set({cardExpanded:isExp?null:card.id})},isExp?'▲':'▼'));cardEl.appendChild(hdr);
    if(isExp){
      const body=el('div',{style:{padding:'16px 18px',background:C.bg}});
      if(card.hint)body.appendChild(el('div',{class:'hint-box'},`힌트: ${card.hint}`));
      const bt=el('div',{style:{lineHeight:'2.2',fontSize:'14px'}});
      parts.forEach(p=>{
        if(p.type==='blank')bt.appendChild(el('span',{style:{display:'inline-block',background:'rgba(224,123,106,.2)',border:'2px solid #e07b6a',borderRadius:'6px',padding:'0 8px',color:'#e07b6a',fontWeight:'800',margin:'0 3px'}},p.value));
        else if(p.type==='cho')bt.appendChild(el('span',{style:{display:'inline-block',background:'rgba(58,175,169,.12)',border:'2px dashed #3aafa9',borderRadius:'6px',padding:'0 8px',color:'#3aafa9',fontWeight:'800',margin:'0 3px'}},p.value+'('+toChosung(p.value)+')'));
        else bt.appendChild(textWithBreaks(p.value));
      });
      body.appendChild(bt);
      if(card.nextReview)body.appendChild(el('div',{style:{marginTop:'10px',fontSize:'11px',color:C.muted,fontWeight:'700'}},`다음 복습: ${new Date(card.nextReview).toLocaleDateString('ko-KR')} · 반복 ${card.reps||0}회`));
      cardEl.appendChild(body);
    }
    sec.appendChild(cardEl);
  });
  wrap.appendChild(sec);return wrap;
}

function renderEditModal(card,subjects,cards){
  let t=card.title,h=card.hint||'',b=card.body,sid=card.subjectId,cid=card.chapterId;
  const chapters=getChapters(subjects,sid);
  const bg=el('div',{class:'modal-bg',onClick:e=>{if(e.target===bg)set({cardEdit:null});}});
  const box=el('div',{class:'modal-box'});
  const tb=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}});
  tb.appendChild(el('div',{style:{fontWeight:'700',fontSize:'20px',color:C.accent}},'카드 수정'));
  tb.appendChild(el('button',{style:{background:'rgba(240,168,152,.2)',border:'none',color:C.accent,fontSize:'18px',cursor:'pointer',borderRadius:'50%',width:'32px',height:'32px'},onClick:()=>set({cardEdit:null})},'X'));
  box.appendChild(tb);
  const grid=el('div',{class:'grid2',style:{marginBottom:'14px'}});
  const subSel=el('select',{class:'inp',onChange:e=>{sid=e.target.value;cid='';}});subjects.forEach(s=>{const o=el('option',{value:s.id},s.name);if(s.id===sid)o.selected=true;subSel.appendChild(o);});
  const chSel=el('select',{class:'inp',onChange:e=>cid=e.target.value});chapters.forEach(c=>{const o=el('option',{value:c.id},c.name);if(c.id===cid)o.selected=true;chSel.appendChild(o);});
  const d1=el('div');d1.appendChild(lbl('과목'));d1.appendChild(subSel);const d2=el('div');d2.appendChild(lbl('챕터'));d2.appendChild(chSel);grid.appendChild(d1);grid.appendChild(d2);box.appendChild(grid);
  box.appendChild(lbl('제목'));const tInp=el('input',{class:'inp',value:t,style:{marginBottom:'10px'},onInput:e=>t=e.target.value});box.appendChild(tInp);
  box.appendChild(lbl('힌트 (선택)'));const hInp=el('input',{class:'inp',value:h,placeholder:'힌트...',style:{marginBottom:'10px'},onInput:e=>h=e.target.value});box.appendChild(hInp);
  box.appendChild(lbl('본문'));const ta=el('textarea',{class:'inp',rows:'8',onInput:e=>b=e.target.value});ta.value=b;box.appendChild(ta);
  const wrapBlank=btn('선택→[[빈칸]]','small',()=>{const s=ta.selectionStart,e=ta.selectionEnd;if(s===e)return;const next=ta.value.slice(0,s)+`[[${ta.value.slice(s,e)}]]`+ta.value.slice(e);ta.value=next;b=next;ta.focus();ta.setSelectionRange(s+2,e+2);});
  const wrapCho=btn('선택→{초성}','small teal',()=>{const s=ta.selectionStart,e=ta.selectionEnd;if(s===e)return;const next=ta.value.slice(0,s)+`{${ta.value.slice(s,e)}}`+ta.value.slice(e);ta.value=next;b=next;ta.focus();ta.setSelectionRange(s+1,e+1);});
  const saveBtn=btn('저장','accent',()=>{if(!t.trim()||!b.trim()){alert('제목과 본문을 입력하세요.');return;}const pp=parseBody(b);if(!pp.some(p=>p.type==='blank'||p.type==='cho')){alert('[[빈칸]] 또는 {초성}을 하나 이상 지정하세요.');return;}persist({subjects,cards:cards.map(c=>c.id===card.id?{...c,title:t.trim(),hint:h.trim(),body:b.trim(),subjectId:sid,chapterId:cid}:c)});set({cardEdit:null});});
  box.appendChild(el('div',{class:'flex',style:{marginTop:'12px',justifyContent:'flex-end'}},[wrapBlank,wrapCho,btn('취소','',()=>set({cardEdit:null})),saveBtn]));
  bg.appendChild(box);return bg;
}

// ── 엔터 전역 처리 (result 화면에서) ─────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const v=S.view;
  if(v==='study'&&S.studyPhase==='result'){
    const card=S.studyQueue[S.studyIdx];if(!card)return;
    const parts=parseForMode(card.body,S.studyMode);const actives=getActiveParts(parts,S.studyMode);
    const allOk=actives.every((a,i)=>(S.studyInputs[i]||'').trim()===a.value.trim());
    if(allOk){persist({...S.data,cards:S.data.cards.map(c=>c.id===card.id?{...c,...getNextReview(c,2)}:c)});const nd=S.studyDone+1,ni=S.studyIdx+1;saveStudy({selSub:S.selSub,selCh:S.selCh,studyIdx:ni,studyDone:nd,studyMode:S.studyMode});if(ni>=S.studyQueue.length)clearStudy();set({studyDone:nd,studyIdx:ni,studyPhase:'answering',studyInputs:[],studyCb:0,studyLocked:new Set()});}
    else{const nl=new Set(actives.map((_,i)=>i).filter(i=>(S.studyInputs[i]||'').trim()===actives[i].value.trim()));const ni2=actives.map((a,i)=>nl.has(i)?a.value:'');const fi=ni2.findIndex((_,i)=>!nl.has(i));set({studyPhase:'answering',studyLocked:nl,studyInputs:ni2,studyCb:fi>=0?fi:0});}
  } else if(v==='test'&&S.testPhase==='result'){
    const card=S.testDeck[S.testIdx];if(!card)return;
    const blanks=parseForMode(card.body,'blank').filter(p=>p.type==='blank');
    const cc=blanks.filter((_,i)=>(S.testInputs[i]||'').trim()===blanks[i].value.trim()).length;
    set({testResults:[...S.testResults,{card,correct:cc,total:blanks.length}],testIdx:S.testIdx+1,testPhase:'answering',testInputs:[],testCb:0});
  } else if(v==='review'&&S.revPhase==='result'){
    const card=S.revDeck[S.revIdx];if(!card)return;
    const blanks=parseForMode(card.body,'blank').filter(p=>p.type==='blank');
    const cc=blanks.filter((_,i)=>(S.revInputs[i]||'').trim()===blanks[i].value.trim()).length;
    if(S.revRound!==2){
      const q=cc===blanks.length?2:cc>0?1:0;
      persist({...S.data,cards:S.data.cards.map(c=>c.id===card.id?{...c,...getNextReview(c,q)}:c)});
      set({revPhase:'answering',revInputs:[],revCb:0,revRound:2});
    } else {
      set({revResults:[...S.revResults,{card,correct:cc,total:blanks.length}],revIdx:S.revIdx+1,revPhase:'answering',revInputs:[],revCb:0,revRound:1});
    }
  }
});

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');app.innerHTML='';app.appendChild(renderHeader());
  const{view}=S;
  if(view==='home')app.appendChild(renderHome());
  else if(view==='create')app.appendChild(renderCreate());
  else if(view==='study'){const r=renderStudy();if(r)app.appendChild(r);}
  else if(view==='test')app.appendChild(renderTest());
  else if(view==='review')app.appendChild(renderReview());
  else if(view==='cards')app.appendChild(renderCards());
}
try{
  render();
} catch(e){
  document.getElementById('app').innerHTML=
    '<div style="padding:20px;color:red;font-size:13px;background:#fff;margin:20px;border-radius:8px">'+
    '<b>오류 발생:</b><br>'+e.message+'<br><br>'+e.stack+'</div>';
}
</script>
